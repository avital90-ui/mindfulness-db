    { name: 'לצאת מהראש ולהיכנס לגוף', type: 'activity', age: '7-9', goal: 'body', duration: 10, summary: 'שוכבים על הרצפה ומפנים קשב לגוף השוכב — סורקים מהראש עד הרגליים ושמים לב לתחושות ללא שיפוט', content: 'מנחים את המתבגרים להוריד משקפיים, לחלוץ נעליים ולשכב על הרצפה בנוחות (חלק על הבטן, חלק על הגב) עם כריות מתחת לראש.\n\nמבקשים מהם להיות מודעים לכך שהם שוכבים שם, ולהפנות תשומת לב לגוף השוכב.\n\n"מה קורה עכשיו?"\n\nסורקים את הגוף מהראש ועד קצות האצבעות — שמים לב לתחושות מבלי להגיב או להתעלם:\n- האם רגל אחת קרה והשנייה חמה?\n- האם יש כאב בברך?\n- האם מרגישים עייפות עמוקה?', tags: ['גוף', 'סריקת גוף', 'חטיבה', 'הרפיה'] },
    { name: 'מתיחות ונשימה', type: 'activity', age: 'all', goal: 'body', duration: 5, summary: 'מותחים יד אחת למעלה ושמים לב לגבול — האם השריר כואב? האם הנשימה נעצרה? לסיום עיסוי קל על הגוף', content: 'עומדים עם שתי רגליים יציבות.\n\n1. זורקים יד אחת למעלה הכי גבוה שאפשר. מרגישים כמה רחוק אפשר להגיע תוך כדי נשימה. בודקים: האם השריר כואב? האם הנשימה נעצרה?\n\n2. מורידים יד ובודקים איך היא מרגישה.\n\n3. זורקים שתי הידיים מעלה — מדמיינים קטיפת תפוחים מענף גבוה. מרגישים הגבול.\n\n4. לסיום: יוצרים קערית בכפות הידיים וטופחים בקצב קל לעיסוי: רגליים → בטן → חזה → זרועות → כתפיים → ראש → פנים.', tags: ['מתיחה', 'גוף', 'נשימה', 'עיסוי'] },
    { name: 'מדחום הרגשות — איך אני מרגיש?', type: 'activity', age: '1-3', goal: 'emotion', duration: 5, summary: 'ילד מצייר 7 מדחומים (אחד לכל יום) ומסמן כמה גבוה הוא מרגיש — קשר בין גוף לרגש', content: 'שואלים את הילד: מה אתה שם לב לגבי הגוף שלך? האם יש לך לפעמים כאבי בטן, כאב ראש, או בחילה? מתי?\n\nהילד יכול לדבר על זה או לצייר את זה.\n\nשאלות: האם ההרגשה הזו משתנה במהלך היום? איך הגוף מרגיש כשאתה קם בבוקר?\n\nהילד מצייר 7 מדחומים (אחד לכל יום בשבוע) ומסמן על המדחום איך הוא מרגיש:\n- למטה = עייף וחלש\n- למעלה = טוב ורענן', tags: ['מדחום', 'רגשות', 'גוף', 'יומן'] },
    { name: 'הצחוק הוא התרופה הטובה ביותר', type: 'activity', age: 'all', goal: 'body', duration: 5, summary: 'עומדים מול מראה ופשוט מתחילים לצחוק — שמים לב אילו איברים בגוף צוחקים. מומלץ עם בני משפחה.', content: 'עומדים מול מראה ופשוט מתחילים לצחוק בקול.\n\nמתבוננים במראה ובודקים: מה קורה בגוף שלי כשאני צוחק?\n\nאילו עוד איברים בגוף צוחקים חוץ מהקול שלי?\n- העיניים?\n- הלחיים?\n- הפה?\n- האם גם הבטן שלי צוחקת?\n- ומה לגבי הכתפיים?\n\nמומלץ מאוד לביצוע יחד עם בני משפחה לשחרור מתח.', tags: ['צחוק', 'גוף', 'משפחה', 'שחרור מתח'] },
    { name: 'הליכה קשובה', type: 'activity', age: '7-9', goal: 'body', duration: 5, summary: 'שמים לב לשרירים הפועלים בריצה, מה קורה כשעוצרים פתאום, ולכמה פעמים ביום רצים על אוטומט', content: 'כשרצים במעלה המדרגות — שימו לב: האם רק הרגליים רצות? אילו שרירים נוספים משתתפים?\n\nכשעוצרים פתאום מריצה — מה מרגישים בגוף? מה קורה לנשימה, לשרירים, לדופק?\n\nמשימה: שימו לב כמה פעמים ביום פורצים בריצה באופן אוטומטי, ונסו ללכת בקצב הליכה רגיל במקום (אלא אם הבית עולה באש).', tags: ['הליכה', 'מודעות גוף', 'חטיבה', 'יומיום'] },
    { name: 'עזרה ראשונה לתחושות לא נעימות', type: 'tool', age: '4-6', goal: 'emotion', duration: 5, summary: 'ללמוד לשים לב, לחוות ולהודות ברגשות — לאתר איפה בגוף מרגישים עצב, פחד, שמחה — במקום להדחיק', content: 'בודקים: איפה בדיוק בתוך הגוף אנחנו מרגישים תחושות כמו עצב, פחד או שמחה?\n\nלומדים כיצד להתמודד עם הרגשות הללו על ידי תשומת לב מודעת:\n- לא להדחיק\n- לא להתעלם\n- לא לאפשר להם להשתלט\n\nפשוט לשים לב ולהיות עם הרגש.', tags: ['רגשות', 'גוף', 'קבלה', 'ויסות רגשי'] },
    { name: 'מקום בטוח — ויזואליזציה', type: 'activity', age: 'all', goal: 'emotion', duration: 8, summary: 'דמיון מודרך: נוסעים בדמיון אל מקום בטוח בעולם הפנימי — מקום שבו אפשר להיות לחלוטין מי שאתה', content: 'תרגיל דמיון מודרך (ויזואליזציה).\n\nמציעים לילדים לנסוע בדמיונם אל "מקום בטוח" בעולם הפנימי שלהם.\n\nמקום נפלא ורגוע שבו הם יכולים:\n- להיות לחלוטין מי שהם באמת\n- להרגיש בטוחים לגמרי\n- להיות מוגנים מכל דבר\n\nמדריכים: "דמיינו את המקום הזה. איך הוא נראה? מה אתם שומעים שם? מה מרגישים בגוף?"', tags: ['ויזואליזציה', 'מקום בטוח', 'הרגעה', 'דמיון מודרך'] },
    { name: 'איך אתה מרגיש עכשיו? — צפרדע הרגשות', type: 'activity', age: '1-3', goal: 'emotion', duration: 5, summary: 'מראים ציורים של צפרדע עם רגשות שונים — הילד מצביע, ומשוחחים: איפה בגוף? איך היית רוצה להגיב?', content: 'מראים לילד ציורים שונים של צפרדע המביעה רגשות (כעס, שמחה, פחד).\nהוא מצביע על הציור שמשקף את מה שהוא מרגיש.\n\nמשוחחים:\n- איפה בגוף אתה מרגיש את זה?\n- איך היית רוצה להגיב?\n- האם תוכל להפנות תשומת לב לרגש ולהישאר איתו קצת, כמו שיושבים ליד חיית מחמד אהובה?\n\nהפעולה מלמדת שהרגש נורמלי ואפשר להכיל אותו.', tags: ['רגשות', 'צפרדע', 'גוף', 'ילדים צעירים'] },
    { name: 'האם אנחנו יכולים לעצור מחשבות?', type: 'activity', age: 'all', goal: 'focus', duration: 2, summary: 'ניסוי: לנסות לא לחשוב כלום 15 שניות — ומגלים שאי אפשר. מחשבות הן כמו עננים חולפים', content: 'ניסוי לבדיקת טבען של המחשבות.\n\nאחד מודד זמן של 15 שניות.\nהשאר עוצמים עיניים ומנסים "לא לחשוב על כלום".\n\nלאחר מכן דנים: מה שמתם לב? האם המשכתם לחשוב "אני לא הולך לחשוב"? על מה כן חשבתם?\n\nמסקנה: אי אפשר פשוט לעצור מחשבות (ואין צורך). אלא לראות אותן כמו עננים חולפים.', tags: ['מחשבות', 'עננים', 'ניסוי', 'קשב'] },
    { name: 'להתבונן במחשבות — מסוע המחשבות', type: 'activity', age: 'all', goal: 'focus', duration: 5, summary: 'מראיין שואל שאלות, שאר המשתתפים שמים לב כמה מהר "מסוע המחשבות" זורק תשובות', content: 'יושבים סביב שולחן. אדם אחד הוא המראיין.\n\nהמראיין שואל: "מהו המאכל האהוב עליך?" / "מה עושה אותך שמח?" / "ממה אתה מודאג?"\n\nלוקחים 5 שניות לכל שאלה — המשתתפים שמים לב איך "מסוע המחשבות" מיד זורק תשובות.\n\nלבסוף: 20 שניות של מחשבות חופשיות — על מה הן חושבות? האם הופיעו גם תמונות?\n\nמשתפים.', tags: ['מחשבות', 'תשומת לב', 'משחק קבוצתי', 'מודעות'] },
    { name: 'על מה אתה דואג? — השלמת משפטים', type: 'activity', age: '4-6', goal: 'emotion', duration: 8, summary: 'הילד משלים משפטים שמתחילים ב"לפעמים אני מודאג מ..." — מזהה תבניות חשיבה מקובעות', content: 'כדי לזהות דאגות ומחשבות טורדניות, הילד משלים:\n\n"לפעמים אני מודאג מ..."\n- להיות מוחרם, ואז אני חושב ש...\n- לא להיות מספיק טוב, ואז אני חושב ש...\n- מריבה, ואז אני חושב ש...\n- שמישהו כועס עליי, ואז אני חושב ש...\n- אם אנשים אוהבים אותי, ואז אני חושב ש...\n\nהילד כותב את המחשבות שלו במחברת.\n\nהתרגיל עוזר להבין ולראות תבניות חשיבה מקובעות.', tags: ['דאגות', 'מחשבות', 'כתיבה', 'מודעות עצמית'] },
    { name: 'קופסת הדאגות הקטנה', type: 'activity', age: '1-3', goal: 'emotion', duration: 8, summary: 'מקשטים קופסה קטנה — לפני שינה כותבים דאגות ומכניסים פיזית לקופסה. סוגרים מכסה ומניחים על מדף רחוק', content: 'מקשטים קופסה קטנה שהופכת לקופסת דאגות.\n\nלפני השינה:\n1. שואלים את הילד אם יש משהו שמרגיז או מדאיג אותו.\n2. במקום לנסות "לא לחשוב" — מוציאים את המחשבות החוצה.\n3. הילד כותב אותן או אומר אותן.\n4. מכניסים אותן פיזית לתוך הקופסה.\n5. סוגרים את המכסה.\n\nהילד מניח את הקופסה על מדף רחוק בחדר — הדאגות שלו יצאו מהראש ונמצאות שמורות בקופסה.', tags: ['דאגות', 'שינה', 'יצירה', 'קופסה'] },
    { name: 'עידוד קטן', type: 'tool', age: 'all', goal: 'emotion', duration: 5, summary: 'היזכרות מכוונת בחוויות חיוביות ורגעים שעשו לי טוב — כדי לתת לעצמי עידוד קטן ולשפר מצב הרוח', content: 'תרגיל שמעצים מודעות לרגעים קטנים ומהנים, במיוחד כשמרגישים מדוכדכים.\n\nמתרגלים היזכרות בחוויות חיוביות ושימת לב לדברים שעושים לנו טוב.\n\nנותנים לעצמנו "עידוד קטן" כדי לשפר מצב הרוח ולראות את הטוב.\n\nשאלות: מה עשה לי טוב היום? מה גרם לי לחייך גם לרגע קטן?', tags: ['עידוד', 'הכרת תודה', 'רגשות חיוביים', 'מצב רוח'] },
    { name: 'סוד חדר הלב', type: 'tool', age: '4-6', goal: 'emotion', duration: 5, summary: 'לאסוף מחמאות ומילים טובות ולאחסן אותן ב"חדר הלב" — כמו תכשיטים יקרים שאפשר לגשת אליהם בכל עת', content: 'הילדים לומדים כיצד לאסוף:\n- מחמאות כנות\n- מילים טובות\n- רגעי חסד שהם מקבלים מאחרים\n\nולאחסן אותם ב"חדר הלב" שלהם.\n\nממש כמו תכשיטים יקרים בתוך כספת — נשמרים בלב, ואפשר תמיד לפנות אליהם כדי לחוש ביטחון, אהבה וקבלה עצמית בדיוק כפי שאנחנו.', tags: ['חמלה עצמית', 'אהבה עצמית', 'מחמאות', 'ביטחון עצמי'] },
    { name: 'לשים לב לחוסר האדיבות — צמיד המודעות', type: 'activity', age: 'all', goal: 'connection', duration: 0, summary: 'עונדים צמיד מגומייה — בכל פעם שמתנהגים בחוסר התחשבות מעבירים ליד השנייה. לשים לב, לא להלקות', content: 'מכינים צמידים מגומיות פשוטות.\nכל אחד עונד את הצמיד על יד ימין כתזכורת להיות נחמד לעצמו ולאחרים.\n\nההנחיה: בכל פעם שמבחינים שהתנהגת בחוסר התחשבות (לעצמך או לאחרים) — העבר את הצמיד ליד השנייה. כשזה קורה שוב — חזור.\n\nהמטרה: לא להלקות את עצמך — אלא פשוט לשים לב לזה, ולהעביר את הצמיד עם חיוך של מודעות.', tags: ['מודעות', 'אדיבות', 'צמיד', 'חוסר שיפוט'] },
    { name: 'להסתכל על התמונה הגדולה', type: 'activity', age: 'all', goal: 'connection', duration: 0, summary: 'מחפשים במכוון תכונות חיוביות אצל אדם שמפריע לנו — במשך יום שלם, בסוד', content: 'חושבים על אדם קרוב שמפריע לנו מאוד, שאנחנו לא מחבבים.\n\nהמשימה: לעבור יום שלם, בסוד מוחלט, שבו מחפשים במכוון אחר תכונות חיוביות אצל אותו אדם:\n- רכות\n- נדיבות\n- טוב לב\n- עזרה\n\nהמטרה: לראות את התמונה המלאה ולהבין שגם אדם שמכעיס אותנו מורכב גם מתכונות יפות.', tags: ['אמפתיה', 'פרספקטיבה', 'קשר', 'סליחה'] },
    { name: 'אני אוהב אותך בגלל ש...', type: 'activity', age: 'all', goal: 'connection', duration: 12, summary: 'כל בן משפחה כותב דבר אחד שהוא אוהב בכל אחד מהאחרים — מרוכזים ומוחבאים מתחת לכרית כהפתעה', content: 'כל אחד ממשתתפי המשפחה מקבל דף עם שמות של שאר בני המשפחה.\n\nכל אחד חושב מה הוא מעריך בכל אחד מהאחרים, ורושם ליד שמו דבר אחד מתוק, נחמד או בלתי נשכח שהוא אוהב בו.\n\nמקפלים את הדפים ונותנים להורה שישמור אותם.\n\nלאחר כמה שבועות — ההורה מרכז את המחמאות שנכתבו על כל בן משפחה ומחביא כל אחד את הרשימה שלו מתחת לכרית כהפתעה.', tags: ['משפחה', 'מחמאות', 'קשר', 'הכרת תודה'] },
    { name: 'עץ המשאלות — שחרור ושחרור שליטה', type: 'activity', age: 'all', goal: 'emotion', duration: 12, summary: 'דמיון מודרך: ניגשים לעץ משאלות עתיק ו"מוסרים" אליו את המשאלה — תרגול של שחרור הצורך בשליטה', content: 'יושבים זקוף בנוחות, חצי עוצמים עיניים, מתרכזים בנשימה.\n\nבדמיון:\n1. יוצאים למקום יפה ובטוח בטבע.\n2. ניגשים לעץ משאלות עתיק וגדול.\n3. חושבים על המשאלה העמוקה שלנו — על רצוננו שמשהו ישתנה.\n4. "מוסרים" את המשאלה אל העץ כדי שתתגשם בזמנה החופשי.\n\nזהו תרגול של שחרור הצורך בשליטה מיידית — דברים מסוימים צריכים את הזמן שלהם להבשיל.\n\nפוקחים עיניים ומשוחחים על החוויה.', tags: ['שחרור', 'דמיון מודרך', 'שליטה', 'סבלנות'] }
  ];

  const existingNames = new Set(db.items.map(i => i.name));
  const toAdd = items.filter(i => !existingNames.has(i.name));
  toAdd.forEach(item => {
    if (!item.source) item.source = 'book';
    if (!item.sourceName) item.sourceName = src;
    item.createdAt = Date.now();
  });
  db.items = [...db.items, ...toAdd];
  save();
})();

(function addForster2() {

  const items = [
    { name: 'היום הטוב ביותר — הרהור חושי', type: 'activity', age: 'all', goal: 'emotion', duration: 5, summary: 'סורקים זיכרון לחיפוש היום הטוב ביותר ומחדשים אותו בכל החושים', content: 'עצמו עיניים. חשבו על היום הטוב ביותר בחיים שלכם עד כה.\nענו בשקט: מה עשיתי? למה הייתי שמח? מה היה מזג האוויר? מה הרגשתי? מה היו הריחות? מה שמעתי? מה טעמתי?\nהתרגיל מחזק את החושים ומסייע לשמר זיכרונות.', tags: ['זיכרון', 'חושים', 'רגשות חיוביים'] },
    { name: 'עיצוב פרצוף — לימוד הבעות פנים', type: 'activity', age: 'all', goal: 'emotion', duration: 15, summary: 'מכינים תווי פנים ניידים לכל רגש ומרכיבים', content: 'חומרים: אבנות/נייר + צבעים/טושים.\n1. עצבו עיניים ופה עבור: שמחה, כעס, עצב, גועל, פחד, הפתעה.\n2. הרכיבו פרצוף ובנו משפט: "כשאני מרגיש [רגש], אני [תגובה]"', tags: ['רגשות', 'הבעות פנים', 'יצירה'] },
    { name: 'יומן כרטיסיות', type: 'activity', age: '4-6', goal: 'emotion', duration: 10, summary: 'כרטיסייה ליום: תאריך, רגש, משפט "אני מרגיש X כי Y", ואיור קטן', content: '1. רשמו תאריך בתחתית הכרטיסייה.\n2. כתבו בראש רגש שאתם חווים כרגע.\n3. כתבו: "אני מרגיש [רגש] כי [סיבה]".\n4. צייר איור קטן שמייצג את הרגש.\n5. קפלו, הדביקו ושמרו בקופסה לעיון מאוחר.', tags: ['יומן', 'רגשות', 'כתיבה'] },
    { name: 'עוגן הצהרות חיוביות', type: 'activity', age: 'all', goal: 'emotion', duration: 15, summary: 'מציירים עוגן ובוחרים הצהרה חיובית אישית — לזכור שהסערה תמיד תעבור', content: 'מציירים עוגן על נייר.\nבוחרים הצהרה אישית: "הטעויות שלי עושות אותי טוב יותר" / "הסערה תעבור" / "לא משנה מה יקרה, אעבור את זה"\nשומרים את התמונה כתזכורת.', tags: ['הצהרות חיוביות', 'חוסן', 'עוגן'] },
    { name: 'נשימה קלה — ספירה 1 עד 10', type: 'tool', age: 'all', goal: 'body', duration: 3, summary: 'נשימות עמוקות עם ספירה: שאיפה = מספר אי-זוגי, נשיפה = זוגי. יד על הבטן', content: 'הניחו יד על הבטן וצפו בה עולה ויורדת.\n1 (שאיפה) - 2 (נשיפה) - 3 (שאיפה) - 4 (נשיפה)... עד 10.\nכשתרגישו פחד ללא סיבה — נשמו וספרו.', tags: ['נשימה', 'ספירה', 'הרגעה'] },
    { name: 'פרח יפהפה — נשימת פרח', type: 'tool', age: '1-3', goal: 'body', duration: 2, summary: 'מדמיינים פרח מיוחד ושואפים ריחו — שאיפה עמוקה, החזקה, נשיפה עדינה', content: 'דמיינו פרח מדהים בצבעים האהובים עליכם.\n1. שאפו לאט כאילו מריחים אותו.\n2. החזיקו — סופגים את הריח פנימה.\n3. נשפו בעדינות מהפה.\nחזרו ארבע פעמים.', tags: ['נשימה', 'ויזואליזציה', 'ילדים צעירים'] },
    { name: 'אף של ארנב — נשימה קצרה', type: 'tool', age: '1-3', goal: 'body', duration: 2, summary: 'שלוש שאיפות קצרות ומהירות כמו ארנב מרחרח + נשיפה ארוכה אחת', content: 'דמיינו שאתם ארנב קטן עם אף ורוד קטן.\n1. רחרחו בשלוש שאיפות קצרות ומהירות תוך כדי כיווץ האף.\n2. נשפו בזרם אחד ארוך מהאף.\nחזרו ובכל פעם האריכו מעט את הנשיפה.', tags: ['נשימה', 'משחק', 'ילדים צעירים', 'ארנב'] },
    { name: 'לחישת נחש', type: 'tool', age: '1-3', goal: 'body', duration: 2, summary: 'שאיפה עמוקה + החזקה + נשיפה איטית עם צליל לחישה — סססס. כמו נחש', content: '1. שאפו דרך האף בזרם ארוך ויציב.\n2. הכניסו אוויר עמוק עד הבטן — ספירה עד שלוש.\n3. נשפו לאט מהפה עם צליל לחישה נמוך: סססס.\nחזרו מספר פעמים.', tags: ['נשימה', 'משחק', 'נחש', 'ילדים צעירים'] },
    { name: 'נשימת 3-4-3', type: 'tool', age: 'all', goal: 'body', duration: 3, summary: 'שאיפה ל-3, החזקה ל-4, נשיפה ל-3 — חמישה מחזורים', content: '1. שאפו דרך האף — ספירה עד 3.\n2. משכו אוויר לחזה ולבטן.\n3. החזיקו — ספירה עד 4.\n4. נשפו דרך הפה — ספירה עד 3.\nחזרו חמישה מחזורים.', tags: ['נשימה', '3-4-3', 'הרגעה', 'טכניקה'] },
    { name: 'נשימת גלים', type: 'tool', age: 'all', goal: 'body', duration: 5, summary: 'מדמיינים עמידה על חוף ים — הנשימה כמו גלים שמגיעים ונסוגים', content: 'עצמו עיניים. דמיינו שאתם עומדים על חוף.\nנשמו פנימה והחוצה כאילו הנשימה היא מי הים:\n- שאיפה = גל שמגיע לחוף\n- נשיפה = גל שנסוג\nהאריכו שאיפות ונשיפות בהדרגה. תנו לגוף להתנדנד קלות.', tags: ['נשימה', 'ים', 'ויזואליזציה'] },
    { name: 'נשימת כף יד', type: 'tool', age: 'all', goal: 'body', duration: 3, summary: 'עוקבים עם האצבע לאורך קווי המתאר של היד — שאיפה כשעולים, נשיפה כשיורדים', content: 'החזיקו יד אחת מושטת קדימה עם אצבעות מרווחות.\nביד השנייה — שימו אצבע מורה על בסיס האגודל.\nעולים על אצבע = שאיפה פנימה.\nיורדים בצד השני = נשיפה החוצה.\nנשמו עד שתסיימו את כל היד.', tags: ['נשימה', 'ידיים', 'ויזואלי'] },
    { name: 'חיבוק עצמי', type: 'tool', age: 'all', goal: 'emotion', duration: 1, summary: 'שילוב הזרועות ומתן חיבוק חם לעצמנו — להקלה מיידית ממצב מוצף', content: 'בפעם הבאה שתרגישו מוצפים:\nשלבו את הזרועות קרוב לגוף ותנו לעצמכם חיבוק חם.\n(הזרועות מתקפלות מעל הבטן, הידיים על הצדדים)\nאפשר לעשות זאת בלי שאף אחד יידע.', tags: ['חמלה עצמית', 'מגע', 'הרגעה מהירה'] },
    { name: 'להחזיק יד של עצמי', type: 'tool', age: 'all', goal: 'emotion', duration: 2, summary: 'כשאין ידיים פנויות — משלבים אצבעות שתי הידיים ומחזיקים חזק', content: 'אם אתם מודאגים ואין ידיים פנויות:\nשלבו את האצבעות של שתי הידיים זו בזו.\nהחזיקו חזק עד שתתחילו להרגיש טוב יותר.', tags: ['חרדה', 'מגע', 'הרגעה מהירה'] },
    { name: 'יד אסירת תודה', type: 'activity', age: 'all', goal: 'emotion', duration: 2, summary: 'מדי יום: מרימים יד פתוחה ומוצאים 5 סיבות חדשות להכרת תודה — קופלת אצבע לכל סיבה', content: 'למשך שתי דקות בכל יום:\nהרימו יד פתוחה מולכם.\nחשבו על סיבות להיות אסירי תודה.\nקפלו אצבע אחת עבור כל סיבה.\nבכל יום — 5 סיבות חדשות.', tags: ['הכרת תודה', 'יומי', 'חיובי'] },
    { name: 'הרהור על פרספקטיבה', type: 'activity', age: '4-6', goal: 'connection', duration: 10, summary: 'יושבים בעיניים עצומות — חושבים על מי שפגע בנו ועל מי שהחמיא לנו. אתגר: שלושה מעשים טובים', content: 'יושבים בעיניים עצומות.\nחישבו על האדם האחרון שהיה מרושע אליכם: מה גרמו המילים? איך אתם חשים עליו עכשיו?\nחישבו על הפעם שמישהו החמיא לכם: איך הרגשתם?\nאיזה מהם תרצו לעורר באחרים?\nאתגר: לפני שקיעת השמש — עשו שלושה מעשים טובים.', tags: ['פרספקטיבה', 'אמפתיה', 'מעשים טובים'] },
    { name: 'מדיטציה שמשית', type: 'activity', age: 'all', goal: 'emotion', duration: 10, summary: 'דמיון מודרך: שדה ירוק שמשי, קשת בענן זוהרת — מסיימים על פסגת הר', content: 'שבו ברגליים משוכלות. עצמו עיניים. נספור עד 10 (1 שאיפה, 2 נשיפה).\nדמיינו שדה ירוק יפהפה עם שמיים כחולים.\nעוברים דרך קשת בענן זוהרת.\nהענן מניח אתכם על פסגת הר — אתם רואים את כל העמק.\nקחו נשימות עמוקות לפני שתפקחו עיניים.', tags: ['דמיון מודרך', 'הרגעה', 'ויזואליזציה'] },
    { name: 'מדיטציה מהירה להרפיה — כדור אור', type: 'activity', age: 'all', goal: 'body', duration: 10, summary: 'כדור אור כחול עולה מכפות הרגליים ועובר בכל הגוף — כל שריר נרפה', content: 'שבו. עצמו עיניים.\nדמיינו כדור אור כחול זוהר. הוא נכנס לגוף דרך כפות הרגליים.\nכל שריר שהוא נוגע — נרפה:\nשוקיים - ירכיים - בטן - חזה - זרועות - כתפיים - פנים\nהאור עוזב דרך הראש. קחו רגע שקט.', tags: ['דמיון מודרך', 'הרפיה', 'גוף'] },
    { name: 'צנצנת נצנצים — כלי נגד מתח', type: 'activity', age: 'all', goal: 'emotion', duration: 15, summary: 'יוצרים צנצנת עם נצנצים — מנערים ומצפים שהכאוס שוקע לאט. כמו המוח שנרגע', content: 'יוצרים צנצנת עם נצנצים בתוך מים.\nנערו את הצנצנת.\nצפו כיצד הכאוס שוקע לאט לקרקעית.\nתחושת רוגע חוזרת כשסדר מתחדש — כמו המוח שלנו כשנרגעים.', tags: ['ויזואליזציה', 'יצירה', 'הרגעה', 'מטאפורה'] },
    { name: 'מתיחת שריטת חתול', type: 'activity', age: 'all', goal: 'body', duration: 5, summary: 'מדמיינים חתול ישנוני שהתעורר — מתחו ידיים, לחצו, ויצרו כפת רגל של חתול', content: 'דמיינו חתול ישנוני שהרגע התעורר.\n1. מתחו זרועות קדימה, שלבו אצבעות — שחררו "מיאו" חזק.\n2. הרימו ידיים מעל הראש — הרגישו המתיחה. הורידו.\n3. עשו אגרוף ולחצו חזק — ספירה עד 5 ואז הרפו.\n4. הרימו כפות ידיים פונות החוצה, כופפו אגודל ושאר אצבעות מעליו — "כף רגל חתול". החזיקו עד 10.', tags: ['מתיחה', 'גוף', 'חתול', 'שחרור מתח'] },
    { name: 'כלב מביט מטה (Downward Dog)', type: 'activity', age: 'all', goal: 'body', duration: 2, summary: 'תנוחת יוגה: ידיים וברכיים, מיישרים רגליים — ישבן גבוה כמו האות V הפוכה', content: 'רדו על הידיים והברכיים — כמו כלב.\nיישרו את הרגליים לאט.\nהעבירו משקל לכפות הרגליים.\nהישבן גבוה באוויר כמו האות V הפוכה.\nהחזיקו למשך 15 שניות.', tags: ['יוגה', 'גוף', 'Downward Dog', 'מתיחה'] },
    { name: 'מתיחת גב ורגל', type: 'activity', age: 'all', goal: 'body', duration: 3, summary: 'ברגליים משוכלות מתכופפים קדימה עם זרועות שלובות — מתיחת גב. אחר כך מגיעים לבהונות', content: '1. שבו על הרצפה ברגליים משוכלות.\n2. הישענו קדימה, שלבו זרועות, מצח נח עליהן. החזיקו 15 שניות. הזדקפו ושקשקו ידיים.\n3. יישרו רגליים קדימה ונסו להגיע לבהונות — ספירה עד 5. הרפו.\nהמטרה: המתיחה, לא הגמישות.', tags: ['מתיחה', 'גב', 'רגליים', 'יוגה'] },
    { name: 'הפעמון — מיקוד בצליל דועך', type: 'activity', age: 'all', goal: 'focus', duration: 5, summary: 'מצלצלים פעמון — הילדים מרימים יד ברגע המדויק שהצליל נעלם. ואז שאלות על החוויה', content: 'צלצלו בפעמון פעם אחת.\nשאלו: מה שמתם לב לגבי הצליל?\nעצמו עיניים. הקשיבו. הרימו יד ברגע המדויק שהצליל נעלם.\nאחרי: האם הצליל הפסיק בבת אחת או דעך? איך החוויה הייתה שונה בעיניים עצומות? האם ראיתם צורה או צבע?', tags: ['פעמון', 'הקשבה', 'ריכוז', 'צלילים'] },
    { name: 'שקית המסתורין', type: 'activity', age: '1-3', goal: 'focus', duration: 10, summary: 'מכניסים יד לשקית אטומה ומנסים לזהות חפץ בעזרת מישוש בלבד', content: 'הכניסו חפצים יומיומיים בשקית אטומה.\n"הכנס יד והרגש חפץ אחד. עיניים עצומות. תאר בקול: קצוות, מרקם, גודל — עד שתהיה מוכן לנחש."\nאחרי: האם ניחשת נכון? האם גילית פרטים חדשים?', tags: ['מישוש', 'ריכוז', 'חושים', 'ניחוש'] },
    { name: 'עלים ופרטים — תצפית בטבע', type: 'activity', age: '4-6', goal: 'focus', duration: 60, summary: 'אוספים עלים בטבע, חוזרים ומתבוננים בהם מקרוב — וורידים, צבעים, ריחות, מרקם', content: 'צאו לטיול בטבע. שימו לב לסביבה בכל החושים. אספו כמה עלים.\nכשחוזרים: עצרו, נשמו, עיניים עצומות — "אפסו" את העיניים.\nעכשיו התבוננו בעלים: כיצד הוורידים עוברים, הצבעים, הריחות, איך הם מרגישים ביד.', tags: ['טבע', 'תצפית', 'חושים', 'עלים'] },
    { name: 'לצייר את הנשימה', type: 'activity', age: '4-6', goal: 'focus', duration: 10, summary: 'מדמיינים את הנשימה כקווים — עולה בשאיפה, יורד בנשיפה — ומציירים על דף', content: '1. עצמו עיניים ונשמו עמוק מספר פעמים.\n2. דמיינו את הנשימה כקווים — עולה בשאיפה, יורד בנשיפה.\n3. העבירו מה שראיתם בדמיון אל הדף. (אין תשובה נכונה)\n4. שחקו עם הנשימה — מהר/איטי — ראו איך זה משנה את הציור.', tags: ['ציור', 'נשימה', 'ביטוי יצירתי'] },
    { name: 'זמן שקט', type: 'activity', age: 'all', goal: 'focus', duration: 3, summary: '1-3 דקות של שקט מוחלט עם טיימר — הילדים מגבילים תזוזות ומתבוננים בעולם', content: 'אל תשתמשו בתרגיל זה כעונש!\n1. הגדירו טיימר ל-1 עד 3 דקות.\n2. שקט מוחלט — הגבילו תזוזות.\n3. כשהטיימר מצלצל: מה ראיתם? מה שמתם לב אליו?\n4. אתגרו לשמור על השלווה לתוך הפעילות הבאה.', tags: ['שקט', 'תצפית', 'ריכוז', 'מנוחה'] },
    { name: 'יצירה עם מרקמים', type: 'activity', age: '1-3', goal: 'focus', duration: 30, summary: 'זמן יצירה מודע — משתמשים בכל החושים: ריח הצבעים, מרקם החימר, תחושת הצבע', content: 'קבעו זמן ליצירה מודעת.\nהילדים יוצרים חופשי תוך שימוש בכל החושים:\n- האם לצבעים יש ריח?\n- איך השעווה מחליקה על הדף?\n- מה המרקם של החימר?\n- איך הצבע מרגיש כשנמרח?\nהצעות: בית ממקלות ארטיק, ציור של חיית מחמד, פסל חימר, לוכד חלומות.', tags: ['יצירה', 'חושים', 'מרקם'] },

    { name: 'סוליות כפות הרגליים — ניהול כעסים', type: 'tool', age: 'all', goal: 'emotion', duration: 7, summary: 'העברת קשב ממצב של עוררות רגשית אל סוליות כפות הרגליים — לשליטה עצמית וניהול כעסים', content: '1. שב זקוף, כפות הרגליים שטוחות על הרצפה. עיניים עצומות אם נוח.\n2. הנח יד על הבטן ושים לב לנשימה שנכנסת ויוצאת — בטן זזה עם הנשימה.\n3. עכשיו — העבר במהירות את כל תשומת הלב אל כפות הרגליים.\n4. נענע את אצבעות הרגליים ושים לב אליהן.\n5. הנח קשב על כריות כפות הרגליים.\n6. התמקד בקשתות של כפות הרגליים.\n7. עבור לעקבים.\n8. הרגש את כל כף הרגל.\n9. המשך להישאר עם הקשב בכפות הרגליים — פשוט נענע אצבעות ושים לב לרגליים.\n10. פקח לאט עיניים וחזור לפעילות.', tags: ['Soles of the Feet', 'כעס', 'ויסות רגשי', 'קרקוע'] },
    { name: 'משחק המסת הקרח', type: 'activity', age: 'all', goal: 'body', duration: 3, summary: 'מחזיקים קוביית קרח ביד — מתרגלים להתבונן בתחושות משתנות (קור, צריבה, הרדמות) ללא תגובה', content: 'הילדים מקבלים קוביית קרח ומחזיקים אותה בכף ידם למשך הזמן הארוך ביותר שיכולים.\n\nבמהלך ההחזקה — נותנים שם לתחושות שמרגישים:\n- קור\n- צריבה\n- עקצוץ\n- חוסר תחושה / הרדמות\n\nלומדים להתבונן בחוויות המשתנות בגוף, לקבל אותן, ולשהות איתן — ללא צורך להגיב מיד או להירתע מגירוי לא נעים.', tags: ['קרח', 'קבלה', 'תחושות גוף', 'סבלנות'] },
    { name: 'כדור שלג / צנצנת המחשבות', type: 'tool', age: 'all', goal: 'focus', duration: 3, summary: 'מנערים צנצנת נצנצים (תודעה סוערת) ומצפים שהנצנצים שוקעים (תודעה מתבהרת) — המחשה ויזואלית', content: 'משתמשים בכדור שלג או צנצנת מלאה במים, חול ונצנצים.\n\n1. מנערים את הצנצנת — הנצנצים מסתחררים (= תודעה עמוסה וסוערת).\n2. מניחים את הצנצנת ומתבוננים בנצנצים השוקעים לאיטם אל הקרקעית.\n3. המים הופכים צלולים.\n\nזה מדגים בצורה מוחשית:\n- את צלילות המחשבה\n- את החשיבות של האטה, עצירה ורגיעה\n- שגם מחשבות קשות שוקעות מעצמן', tags: ['צנצנת', 'מחשבות', 'ויזואליזציה', 'הרגעה'] },
    { name: 'FOFBOC — רגליים על הרצפה, גוף על הכיסא', type: 'tool', age: '7-9', goal: 'body', duration: 2, summary: 'קרקוע מהיר: שים לב לכפות הרגליים על הרצפה ולמשקל הגוף על הכיסא — מייצב ברגעי מתח', content: 'FOFBOC = Feet on Floor, Body on Chair\n\nעצור ושים לב למגע הפיזי של הגוף עם הסביבה היציבה:\n- הרגש במודעות מלאה את כפות הרגליים המונחות על הרצפה\n- הרגש את המשקל של הגוף המונח על הכיסא\n\nהתרגיל עוזר לחוש יותר מקורקע, יציב ומחובר לכאן-ועכשיו ברגעים של מתח או הצפה רגשית.', tags: ['קרקוע', 'FOFBOC', 'חטיבה', 'מתח'] },
    { name: 'מרווח נשימה SOBER', type: 'tool', age: '4-6', goal: 'emotion', duration: 3, summary: 'חמישה שלבים לוויסות רגשי: Stop / Observe / Breathe / Expand / Respond', content: 'S — עצור (Stop): עצור את הפעולה האוטומטית.\nO — התבונן (Observe): התבונן במה שקורה בגוף, ברגש ובמחשבה.\nB — נשום (Breathe): התמקד בנשימה כדי להתקרקע.\nE — הרחב (Expand): הרחב את המודעות חזרה אל כל הגוף והסביבה.\nR — הגב (Respond): הגב באופן מודע ומושכל — לא מתוך דחף אוטומטי.\n\nיעיל במיוחד למצבי דחף ותוקפנות.', tags: ['SOBER', 'ויסות רגשי', 'ראשי תיבות', 'כעס'] },
    { name: 'גלישת דחפים (Urge Surfing)', type: 'tool', age: '7-9', goal: 'emotion', duration: 4, summary: 'מדמים דחף לגל בים — הוא עולה, מגיע לשיא, ויורד. מגלשים עליו ומחכים שישכך', content: 'במקום לנסות להימנע מדחף או להדחיק אותו:\n\n1. שים לב לדחף עצמו — ממה הוא עשוי? איפה הוא בגוף?\n2. דמיין אותו כגל בים — הוא עולה, מגיע לשיא, ואז נשבר ויורד.\n3. "גלוש" על הגל: התבונן בו, חוש אותו בגוף — ללא שיפוטיות וללא תגובה התנהגותית.\n4. חכה שהוא ישכך וייעלם מעצמו.\n\nמועיל לכעסים, דחפים, ורגעים של השתוקקות.', tags: ['Urge Surfing', 'דחפים', 'גל', 'ויסות רגשי'] },
    { name: 'תרגיל ההסחה — מדיטציה עם רעשים', type: 'activity', age: '4-6', goal: 'focus', duration: 8, summary: 'חצי הכיתה מדטטים בזמן שהחצי השני מייצר הסחות — לאמן קשב מתמשך ולפתח קבלה לא שיפוטית', content: 'מחלקים לשתי קבוצות:\n\nקבוצה א — "המודטים": יושבים, עוצמים עיניים ומתרגלים מדיטציה (מיקוד בנשימה או בגוף).\n\nקבוצה ב — "מסיחי הדעת": מתהלכת סביבם ומייצרת רעשים, קולות, הסחות.\n\nהמודטים מאמנים:\n- קשב מתמשך\n- קבלה לא שיפוטית כלפי הפרעות\n\nאחרי מספר דקות — מתחלפים בתפקידים.', tags: ['הסחת דעת', 'ריכוז', 'ADHD', 'קבלה'] },
    { name: 'ספירת נשימות — אימון קשב מתמשך', type: 'tool', age: '7-9', goal: 'focus', duration: 15, summary: 'ספירת נשימות מ-1 עד 9 בסבבים — מאמן קשב מתמשך וזיהוי נדידת מחשבות', content: 'יושבים זקוף ונוח.\n\nספרו כל נשימה מ-1 עד 9, בסבבים חוזרים.\n\nכשמבחינים שהמחשבה נדדה ואיבדתם ריכוז מהספירה:\n1. ציינו זאת בשקט (ללא שיפוט עצמי)\n2. חזרו לספירה מ-1\n\nהתרגיל מאמן:\n- קשב מתמשך\n- זיהוי נדידת מחשבות\n- חזרה עדינה לריכוז', tags: ['ספירה', 'נשימה', 'קשב מתמשך', 'מחשבות'] },
    { name: 'נשימת היי-הו — להפחתת כאב', type: 'tool', age: 'all', goal: 'body', duration: 5, summary: 'נשימות איטיות ועמוקות עם צלילי "היי-הו" קצביים — להרגעת המערכת ולהתמודדות עם כאב', content: 'טכניקה שנוסתה על ילדים חולים לניהול כאב.\n\n1. נשמו נשימות איטיות ועמוקות מאוד.\n2. תוך כדי הנשיפה — השמיעו צלילי "היי-הו" קצביים בקצב שנוח לכם.\n\nהמטרה:\n- להרגיע את המערכת הפיזיולוגית\n- להתמודד עם כאב כרוני\n- להתמודד עם כאב במהלך פרוצדורות רפואיות', tags: ['כאב', 'נשימה', 'היי-הו', 'הרגעה'] },
    { name: 'סריקת גוף מותאמת לילדים', type: 'activity', age: 'all', goal: 'body', duration: 7, summary: 'סריקת גוף קצרה עם הנחיה מילולית רציפה (פחות שתיקות) — ומקום לתחושות קשות כמו שעמום ואי-שקט', content: 'סריקת גוף מותאמת לילדים (לא 40 דקות כמו למבוגרים — מתחילים קצר ומאריכים בהדרגה).\n\nהמנחה משתמש בהנחיה מילולית רציפה ושוטפת — עם פחות שתיקות בין משפט למשפט.\n\nסורקים את הגוף אחד אחד לאורך חלקיו השונים.\n\nמאפשרים לילדים להכיר ולקבל גם תחושות מאתגרות:\n- שעמום\n- תסכול\n- אי-שקט של הגוף\nכחלק מההתבוננות — לא כבעיה.', tags: ['סריקת גוף', 'ילדים', 'קבלה', 'MBSR'] },
    { name: 'STOP — עצור, שים לב, המשך', type: 'tool', age: 'all', goal: 'emotion', duration: 2, summary: 'גרסה קצרה לויסות רגשי: עצור — קח נשימה — התבונן — המשך', content: 'ברגע של קושי, תגובה אוטומטית או סערה רגשית:\n\nS — Stop: עצור את כל מה שאתה עושה.\nT — Take a breath: קח נשימה ארוכה ואיטית.\nO — Observe: שים לב למה שקורה בגוף, ברגש ובמחשבה.\nP — Proceed: המשך — כעת עם מודעות רבה יותר.\n\nניתן להשתמש בכל רגע של יום — כשאתה מרגיש שאתה "על אוטומטי".', tags: ['STOP', 'ויסות', 'עצירה', 'נוכחות'] }

(function addSBSM() {

    { name: 'האזנה מודעת — היעגנות לצלילים', type: 'tool', age: '7-9', goal: 'focus', duration: 1, summary: 'טיימר דקה — מקשיבים לצלילים רחוקים וקרובים, קבועים ומשתנים. כל שיטוט ומחזרה = "כפיפת זרוע למוח"', content: 'כוונו טיימר לדקה אחת.\nהיכנסו לתנוחת גוף מודעת. עצמו עיניים.\n\nהקשיבו לכל הצלילים השונים:\n- צלילים רחוקים וקרובים\n- צלילים קבועים (זמזום אוורור)\n- צלילים שבאים והולכים (אנשים במסדרון)\n\nכשתשומת הלב נודדת — וזה בסדר גמור — בכל פעם שחוזרים להקשיב, משתפרים במודעות. זה כמו לעשות כפיפת זרוע למוח!\n\nשימו לב לדחפים (לפקוח עיניים, לקפל אצבעות, לשנות תנוחה) — במקום להגיב, שימו לב אליהם ואז חזרו לדומיה.', tags: ['הקשבה', 'צלילים', 'קשב', 'UCLA MARC'] },
    { name: 'נשימה מודעת והאטה', type: 'tool', age: '7-9', goal: 'focus', duration: 1, summary: 'טיימר דקה — מתמקדים בנשימה במקום שמרגישים אותה בקלות. כשהמוח נודד — חוזרים בסקרנות ואדיבות', content: 'כוונו טיימר לדקה אחת.\n\nהתמקדו בנשימה במקום שמרגישים את התחושה בקלות רבה ביותר.\n\nאם המוח נודד — עם יחס סקרן ואדיב, חזרו והתמקדו.\n\nדקה אחת של התמקדות בנשימה ביום יכולה לעזור:\n- להתרכז באופן כללי\n- להרגיש יותר בטוחים בעצמכם', tags: ['נשימה', 'ריכוז', 'דקה', 'UCLA MARC'] },

    { name: 'מדיטציית Loving Kindness — UCLA', type: 'activity', age: '7-9', goal: 'connection', duration: 3, summary: 'מדמיינים מישהו שקל לאהוב — שמח, בריא, שלוו — ושולחים לו שלושה איחולים. אחר כך לעצמנו.', content: 'התמקמו בנוחות. עגנו קשב בנשימה.\n\nהעלו מישהו שקל לכם לאהוב (אפילו חיית מחמד).\n\nדמיינו אותם:\n- נראים שמחים — מה הם עושים?\n- בריאים וחזקים\n- שלווים ונינוחים\n\nשלחו להם שלושה איחולים:\n1. "מי ייתן ותהיה/י שמח/ה"\n2. "מי ייתן ותהיה/י בריא/ה וחזק/ה"\n3. "מי ייתן ותרגיש/י שליו/וה ונינוח/ה"\n\nחזרו על האיחולים פעם נוספת.\nלאחר מכן — שלחו את אותם איחולים גם לעצמכם.', tags: ['Loving Kindness', 'חמלה', 'קשר', 'UCLA MARC'] },
    { name: 'כתיבת מכתב אהבה וחסד', type: 'activity', age: '7-9', goal: 'connection', duration: 5, summary: 'כותבים פתק/מכתב/שיר של אהבה וחסד לעצמנו, לחיה או למישהו — כמה שיותר איחולים טובים', content: 'כתבו פתק, מכתב או שיר של אהבה וחסד:\n- לעצמכם\n- לחיה\n- למישהו שאתם רוצים לשלוח לו איחולים טובים\n\nכתבו כמה שיותר איחולים טובים שאתם מצליחים לחשוב עליהם.\n\nלאחר מכן — דמיינו שהאדם/החיה ממש מרגישים את כל האיחולים שבירכתם אותם בהם.\n\nאפשר לשתף את האיחולים עם האדם אליו כיוונתם — או לשמור לעצמכם.', tags: ['Loving Kindness', 'כתיבה', 'חמלה', 'UCLA MARC'] },
    { name: 'לאתגר מחשבות שליליות — ארבע שאלות', type: 'activity', age: '7-9', goal: 'emotion', duration: 5, summary: 'ארבע שאלות לאתגור מחשבה שלילית: האם זה אמת? נכון לחלוטין? איך זה מרגיש? איך יהיה בלעדיה?', content: 'כשעולה מחשבה שלילית או ביקורתית — שאלו את עצמכם ארבע שאלות:\n\n1. האם המחשבה הזו אמת?\n2. האם היא נכונה לחלוטין — ללא יוצאים מן הכלל?\n3. איך זה מרגיש (רגשית ופיזית) לחוות את המחשבה הזו?\n4. איך זה יהיה אם לא הייתה לי את המחשבה הזו?\n\nלרוב יש יוצאים מן הכלל למחשבות הנוקשות — זה פותח אפשרות לשחרר אותן לטובת מחשבות מדויקות וחיוביות יותר.', tags: ['מחשבות', 'ביקורת עצמית', 'ארבע שאלות', 'UCLA MARC'] },
    { name: 'איחולים חברותיים לעצמנו — חמלה עצמית', type: 'activity', age: '7-9', goal: 'emotion', duration: 3, summary: 'חושבים על תכונות מעוררות חיבה שיש בנו — ושולחים לעצמנו איחולים: שמח, שליו, בטוח', content: 'התמקמו בנוחות.\n\n1. חשבו על מישהו שקל לכם לדאוג לו. שימו לב לחום הגופני שעולה.\n2. העלו כמה תכונות מעוררות חיבה שיש בכם — פעם שהייתם נדיבים, מאמץ שהשקעתם.\n3. חזרו על איחולים חברותיים לעצמכם:\n"מי ייתן ואהיה שמח/ה"\n"מי ייתן ואהיה שליו/וה"\n"מי ייתן ואהיה בטוח/ה"\n\nהישארו מחוברים לתחושות הנינוחות והחום — התענגו עליהן כמה שניות.', tags: ['חמלה עצמית', 'Loving Kindness', 'איחולים', 'UCLA MARC'] },
    { name: 'יומן הערכה עצמית', type: 'activity', age: '7-9', goal: 'emotion', duration: 5, summary: 'בתחילת או סוף כל יום — כותבים שלושה דברים שמעריכים בעצמנו. משפיע על הדיבור הפנימי', content: 'בתחילת או בסוף כל יום, במשך שבוע אחד:\n\nהוציאו דף נייר וכתבו שלושה דברים שאתם מעריכים בעצמכם.\n\nהרהרו: כיצד זה משפיע על הדיבור הפנימי שלכם עם עצמכם?\n\nאתם עשויים להבחין שהמחשבות שלכם הופכות לחיוביות יותר עם הזמן.', tags: ['יומן', 'הערכה עצמית', 'דיבור פנימי', 'UCLA MARC'] },
    { name: 'תרגול הכרת תודה — UCLA', type: 'activity', age: '7-9', goal: 'emotion', duration: 3, summary: 'ארבעה מעגלי הכרת תודה: דברים כלליים / אדם ספציפי / סביבה / מאמצים שלנו היום', content: 'התמקמו בנוחות.\n\nשאלו את עצמכם: "על מה אני אסיר/ת תודה?"\nחשבו על שלושת הדברים הראשונים שעולים.\n\nאחר כך:\n- אדם ספציפי שנהנים מנוכחותו — אילו תכונות מעריכים בו?\n- השכונה/הסביבה — מה מעריכים בה?\n- מאמציכם היום — מה עשיתם שאתם אסירי תודה עליו?\n\nקחו רגע להבחין כיצד אתם מרגישים כשמקדישים זמן למחשבה על אלה.', tags: ['הכרת תודה', 'UCLA MARC', 'רגשות חיוביים'] },
    { name: 'סקירת מיינדפולנס — UCLA', type: 'activity', age: '7-9', goal: 'focus', duration: 5, summary: 'תרגיל משולב: הקשבה לצלילים → סריקת גוף → Loving Kindness עצמי. תרגיל סיום שלם', content: 'עצמו עיניים (או מבט על נקודה מולכם).\n\nדקה-שתיים הקשבה לצלילים — קרובים ורחוקים.\nכשתשומת הלב נודדת — ציינו בעדינות וחזרו.\n\nסריקת גוף:\nכפות רגליים → רגליים → בטן → חזה → צוואר → זרועות → ידיים → גב → ראש → מצח → לחיים → עיניים.\n\nלסיום — Loving Kindness לעצמנו:\nחשבו על תכונה חיובית שיש בכם. שלחו לעצמכם חמלה.\n\nמתחו לאט ופקחו עיניים.', tags: ['סקירה', 'סריקת גוף', 'Loving Kindness', 'UCLA MARC'] }
  ];

  const existingNames = new Set(db.items.map(i => i.name));
  const toAdd = items.filter(i => !existingNames.has(i.name));
  toAdd.forEach(item => {
    item.source = 'book';
    item.sourceName = src;
    item.createdAt = Date.now();
  });
  db.items = [...db.items, ...toAdd];
  save();
})();

// ── LESSON BUILDER ──────────────────────────────────────────
function openLessonBuilder() {
  document.getElementById('lessonResult').style.display = 'none';
  document.getElementById('lessonModal').classList.add('open');
}

function buildLesson() {
  const totalTime = parseInt(document.getElementById('lessonTime').value) || 45;
  const ageFilter = document.getElementById('lessonAge').value;
  const goalFilter = document.getElementById('lessonGoal').value;
  const structure = document.getElementById('lessonStructure').value;

  // Filter relevant items
  let pool = db.items.filter(item => {
    if (!item.duration || item.duration <= 0) return false;
    if (ageFilter && item.age !== ageFilter && item.age !== 'all') return false;
    return true;
  });

  if (pool.length < 3) {
    showToast('לא נמצאו מספיק פריטים מתאימים');
    return;
  }

  // Shuffle pool
  pool = pool.sort(() => Math.random() - 0.5);

  // Define phase structure
  let phases;
  const openTime = Math.min(5, Math.round(totalTime * 0.12));
  const closeTime = Math.min(5, Math.round(totalTime * 0.12));
  const mainTime = totalTime - openTime - closeTime;

  if (structure === 'movement') {
    phases = [
      { name: 'פתיחה', duration: openTime, goals: ['focus', 'body'], types: ['activity', 'tool'] },
      { name: 'עיקרי א׳ — תנועה', duration: Math.round(mainTime * 0.5), goals: ['body', 'focus'], types: ['activity'] },
      { name: 'עיקרי ב׳ — משחק', duration: Math.round(mainTime * 0.5), goals: ['body', 'connection', 'focus'], types: ['activity'] },
      { name: 'סגירה', duration: closeTime, goals: ['emotion', 'focus'], types: ['tool', 'activity'] }
    ];
  } else if (structure === 'calm') {
    phases = [
      { name: 'כניסה לשקט', duration: openTime, goals: ['focus', 'body'], types: ['tool', 'activity'] },
      { name: 'הרגעה עמוקה', duration: Math.round(mainTime * 0.6), goals: ['body', 'emotion'], types: ['activity', 'tool'] },
      { name: 'עיבוד פנימי', duration: Math.round(mainTime * 0.4), goals: ['emotion', 'focus'], types: ['activity'] },
      { name: 'סגירה', duration: closeTime, goals: ['connection', 'emotion'], types: ['tool', 'activity'] }
    ];
  } else if (structure === 'pairs') {
    phases = [
      { name: 'פתיחה', duration: openTime, goals: ['focus', 'body'], types: ['tool', 'activity'] },
      { name: 'עבודה בזוגות א׳', duration: Math.round(mainTime * 0.45), goals: ['connection', 'emotion'], types: ['activity'] },
      { name: 'עבודה בזוגות ב׳', duration: Math.round(mainTime * 0.45), goals: ['connection', 'focus'], types: ['activity'] },
      { name: 'שיתוף וסגירה', duration: closeTime, goals: ['connection', 'emotion'], types: ['activity', 'tool'] }
    ];
  } else { // balanced
    phases = [
      { name: 'פתיחה — כניסה לנוכחות', duration: openTime, goals: ['focus', 'body'], types: ['tool', 'activity'] },
      { name: 'עיקרי א׳', duration: Math.round(mainTime * 0.45), goals: goalFilter ? [goalFilter] : ['focus', 'body', 'emotion', 'connection'], types: ['activity'] },
      { name: 'עיקרי ב׳', duration: Math.round(mainTime * 0.45), goals: goalFilter ? [goalFilter] : ['focus', 'body', 'emotion', 'connection'], types: ['activity', 'tool'] },
      { name: 'סגירה — עיגון', duration: closeTime, goals: ['emotion', 'connection', 'focus'], types: ['tool', 'activity'] }
    ];
  }

  // Pick items for each phase
  const usedIds = new Set();
  const result = [];

  for (const phase of phases) {
    let candidates = pool.filter(item => {
      if (usedIds.has(item.id)) return false;
      if (item.duration > phase.duration + 3) return false;
      return true;
    });

    // Prefer matching goal
    const goalMatch = candidates.filter(item => phase.goals.includes(item.goal));
    const source = goalMatch.length > 0 ? goalMatch : candidates;

    if (source.length === 0) continue;

    const picked = source[Math.floor(Math.random() * source.length)];
    usedIds.add(picked.id);
    result.push({ phase: phase.name, item: picked, phaseDur: phase.duration });
  }

  // Render
  const totalActual = result.reduce((s, r) => s + (r.item.duration || 0), 0);
  const tc = TYPE_CONFIG;
  const gc = GOAL_CONFIG;
  const ac = AGE_CONFIG;

  const html = result.map((r, i) => {
    const item = r.item;
    const tConf = tc[item.type] || tc.tool;
    const gConf = gc[item.goal] || gc.focus;
    const aConf = ac[item.age] || ac.all;
    return `
    <div class="lesson-block">
      <div class="lesson-block-phase">${i + 1}. ${esc(r.phase)}</div>
      <div class="lesson-block-header">
        <div class="lesson-block-title">${esc(item.name)}</div>
        <div class="lesson-block-meta">
          <span class="tag ${tConf.class}">${tConf.label}</span>
          <span class="tag ${gConf.class}">${gConf.label}</span>
          <span class="lesson-block-dur">⏱ ${item.duration} דק׳</span>
        </div>
      </div>
      ${item.summary ? `<div class="lesson-block-summary">${esc(item.summary)}</div>` : ''}
      ${item.sourceName ? `<div style="font-size:11px;color:var(--ink-muted);margin-top:6px">📖 ${esc(item.sourceName)}</div>` : ''}
    </div>`;
  }).join('');

  const tips = [
    'הקדישי דקה אחת לתחילת כל פעילות לנשימה משותפת.',
    'אפשרי לילדים לבחור תנוחת ישיבה נוחה להם.',
    'אם פעילות לא עובדת — עצרי ועברי לבאה. גמישות היא מיינדפולנס בפעולה.',
    'שתפי את הכוונה בתחילת השיעור: "היום נתרגל לשים לב..."',
    'סיימי תמיד בשיתוף קצר: "מה שמתם לב אליו היום?"'
  ];
  const tip = tips[Math.floor(Math.random() * tips.length)];

  document.getElementById('lessonPlan').innerHTML = html + `
    <div class="lesson-total">
      <span>סה״כ זמן מוערך</span>
      <span>${totalActual} דקות מתוך ${totalTime} מבוקשות</span>
    </div>
    <div class="lesson-tip">💡 <strong>טיפ למנחה:</strong> ${tip}</div>`;
  document.getElementById('lessonResult').style.display = 'block';
  document.getElementById('lessonResult').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function printLesson() {
  window.print();
}
