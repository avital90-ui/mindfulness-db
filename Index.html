<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מאגר מיינדפולנס לילדים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Frank+Ruhl+Libre:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #5c7a5c;
    --sage-light: #8aab8a;
    --sage-pale: #d4e4d4;
    --cream: #f5f0e8;
    --warm-white: #faf8f4;
    --ink: #1a1a18;
    --ink-soft: #3d3d38;
    --ink-muted: #7a7a72;
    --amber: #c8883a;
    --amber-light: #e8b86a;
    --terracotta: #b85c3a;
    --sky: #4a7a9b;
    --lavender: #7a6a9b;
    --border: #d8d4c8;
    --shadow: rgba(30,30,20,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    direction: rtl;
  }

  /* HEADER */
  header {
    background: var(--ink);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.25);
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .logo-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 0.02em;
  }

  .logo-sub {
    font-size: 12px;
    color: var(--sage-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header-stats {
    display: flex;
    gap: 24px;
  }

  .stat-chip {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    color: var(--sage-light);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-chip strong {
    color: var(--amber-light);
    font-weight: 700;
  }

  .btn-add-main {
    background: var(--sage);
    color: white;
    border: none;
    padding: 10px 22px;
    border-radius: 8px;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-add-main:hover {
    background: var(--sage-light);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(92,122,92,0.4);
  }

  /* TOOLBAR */
  .toolbar {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 16px 40px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
  }

  .search-wrap svg {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-muted);
  }

  #searchInput {
    width: 100%;
    padding: 10px 38px 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    background: white;
    outline: none;
    transition: border-color 0.2s;
  }

  #searchInput:focus { border-color: var(--sage); }

  .filter-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-select {
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    background: white;
    color: var(--ink);
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    min-width: 130px;
  }

  .filter-select:focus { border-color: var(--sage); }

  .btn-clear {
    padding: 9px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    background: white;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-clear:hover { border-color: var(--terracotta); color: var(--terracotta); }

  /* VIEW TOGGLE */
  .view-toggle {
    display: flex;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .view-btn {
    padding: 8px 14px;
    border: none;
    background: white;
    cursor: pointer;
    color: var(--ink-muted);
    transition: all 0.15s;
    font-size: 16px;
  }

  .view-btn.active { background: var(--sage); color: white; }

  /* MAIN LAYOUT */
  main {
    padding: 32px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* RESULTS BAR */
  .results-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .results-count {
    font-size: 13px;
    color: var(--ink-muted);
  }

  .results-count span { color: var(--ink); font-weight: 600; }

  /* GRID VIEW */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  /* LIST VIEW */
  .cards-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* CARD */
  .card {
    background: white;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    overflow: hidden;
    transition: all 0.2s;
    cursor: pointer;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    border-color: var(--sage-light);
    box-shadow: 0 6px 24px var(--shadow);
    transform: translateY(-2px);
  }

  .card-accent {
    height: 4px;
  }

  .card-body {
    padding: 18px 20px;
  }

  .card-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Type colors */
  .tag-activity { background: #e8f4e8; color: var(--sage); }
  .tag-session { background: #e8f0f8; color: var(--sky); }
  .tag-tool { background: #f4ede8; color: var(--amber); }
  .tag-quote { background: #ede8f4; color: var(--lavender); }

  /* Goal colors */
  .tag-focus { background: #fff3e0; color: #e65100; }
  .tag-emotion { background: #fce4ec; color: #c2185b; }
  .tag-body { background: #e8f5e9; color: #2e7d32; }
  .tag-connection { background: #e3f2fd; color: #1565c0; }

  /* Age colors */
  .tag-age1 { background: #f3e5f5; color: #6a1b9a; }
  .tag-age2 { background: #e8eaf6; color: #283593; }
  .tag-age3 { background: #e0f7fa; color: #006064; }

  .card-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .card-desc {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.65;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--warm-white);
  }

  .card-duration {
    font-size: 12px;
    color: var(--ink-muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .card-source {
    font-size: 11px;
    color: var(--ink-muted);
    background: var(--cream);
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .card-actions {
    display: flex;
    gap: 6px;
  }

  .btn-icon {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-muted);
    transition: all 0.15s;
    font-size: 14px;
  }

  .btn-icon:hover { background: var(--sage-pale); color: var(--sage); }
  .btn-icon.delete:hover { background: #fde8e8; color: var(--terracotta); }

  /* LIST CARD */
  .card-list-inner {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 20px;
  }

  .list-accent-bar {
    width: 4px;
    height: 40px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .list-content { flex: 1; }

  .list-title {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 4px;
  }

  .list-tags { display: flex; gap: 6px; flex-wrap: wrap; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,8,0.7);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(3px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: 16px;
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: modalIn 0.25s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 24px 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-title {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
  }

  .modal-close {
    width: 36px;
    height: 36px;
    border: none;
    background: var(--cream);
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-muted);
    transition: all 0.15s;
  }

  .modal-close:hover { background: #fde8e8; color: var(--terracotta); }

  .modal-body { padding: 20px 28px 28px; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  input[type="text"],
  input[type="number"],
  select,
  textarea {
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--warm-white);
    outline: none;
    transition: border-color 0.2s;
    direction: rtl;
  }

  input:focus, select:focus, textarea:focus { border-color: var(--sage); background: white; }

  textarea { min-height: 100px; resize: vertical; line-height: 1.6; }

  .form-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-start;
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .btn-save {
    background: var(--sage);
    color: white;
    border: none;
    padding: 11px 28px;
    border-radius: 8px;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-save:hover { background: var(--sage-light); box-shadow: 0 4px 12px rgba(92,122,92,0.3); }

  .btn-cancel {
    background: transparent;
    color: var(--ink-muted);
    border: 1.5px solid var(--border);
    padding: 11px 22px;
    border-radius: 8px;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--ink-muted); color: var(--ink); }

  /* DETAIL MODAL */
  .detail-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }

  .detail-section {
    margin-bottom: 18px;
  }

  .detail-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-muted);
    margin-bottom: 6px;
  }

  .detail-text {
    font-size: 14px;
    line-height: 1.75;
    color: var(--ink-soft);
    white-space: pre-wrap;
  }

  .detail-meta-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    padding: 14px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 18px;
  }

  .detail-meta-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .detail-meta-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-muted);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; color: var(--ink-soft); margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }

  /* EXPORT */
  .toolbar-right { display: flex; gap: 8px; margin-right: auto; }

  .btn-export {
    padding: 9px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    background: white;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-export:hover { border-color: var(--amber); color: var(--amber); }

  /* SECTION DIVIDERS */
  .section-header {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
    padding: 8px 0 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-count {
    background: var(--sage-pale);
    color: var(--sage);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* NOTIFICATION */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 9999;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 700px) {
    header { padding: 16px 20px; }
    .header-stats { display: none; }
    .toolbar { padding: 12px 20px; }
    main { padding: 20px; }
    .form-row { grid-template-columns: 1fr; }
  }

  /* LESSON BUILDER */
  .btn-lesson {
    background: var(--sage-pale) !important;
    color: var(--sage) !important;
    border-color: var(--sage-light) !important;
    font-weight: 600 !important;
  }
  .btn-lesson:hover { background: var(--sage) !important; color: white !important; }

  .lesson-block {
    background: var(--warm-white);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 12px;
    position: relative;
    border-right: 4px solid var(--sage);
  }
  .lesson-block-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .lesson-block-title {
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
  }
  .lesson-block-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .lesson-block-dur {
    font-size: 13px;
    color: var(--ink-muted);
    background: var(--sage-pale);
    padding: 2px 10px;
    border-radius: 10px;
  }
  .lesson-block-summary {
    font-size: 13px;
    color: var(--ink-muted);
    line-height: 1.5;
  }
  .lesson-block-phase {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 4px;
  }
  .lesson-total {
    background: var(--ink);
    color: white;
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 14px;
    font-weight: 600;
    margin-top: 16px;
    display: flex;
    justify-content: space-between;
  }
  .lesson-tip {
    background: #fffbf0;
    border: 1px solid var(--amber-light);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--ink-muted);
    margin-top: 10px;
    line-height: 1.5;
  }

  @media print {
    header, .toolbar, .toast, .modal-header button,
    .btn-save, .btn-export, .btn-lesson, .btn-cancel { display: none !important; }
    .modal-overlay { position: static !important; background: none !important; }
    .modal { box-shadow: none !important; max-width: 100% !important; }
    body { background: white !important; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-title">מאגר מיינדפולנס לילדים</span>
    <span class="logo-sub">כלים · פעילויות · מפגשים</span>
  </div>
  <div class="header-stats">
    <div class="stat-chip">סה"כ פריטים: <strong id="totalCount">0</strong></div>
    <div class="stat-chip">מוצגים: <strong id="filteredCount">0</strong></div>
  </div>
  <button class="btn-add-main" onclick="openAddModal()">＋ הוסף פריט</button>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="חיפוש חופשי..." oninput="renderCards()">
  </div>
  <div class="filter-group">
    <select class="filter-select" id="filterType" onchange="renderCards()">
      <option value="">כל הסוגים</option>
      <option value="activity">פעילות / תרגיל</option>
      <option value="session">מפגש שלם</option>
      <option value="tool">כלי / טכניקה</option>
      <option value="quote">ציטוט / רעיון</option>
    </select>
    <select class="filter-select" id="filterAge" onchange="renderCards()">
      <option value="">כל הגילאים</option>
      <option value="1-3">כיתות א'–ג'</option>
      <option value="4-6">כיתות ד'–ו'</option>
      <option value="7-9">חטיבת ביניים</option>
      <option value="all">כל הגילאים</option>
    </select>
    <select class="filter-select" id="filterGoal" onchange="renderCards()">
      <option value="">כל המטרות</option>
      <option value="focus">ריכוז</option>
      <option value="emotion">רגש</option>
      <option value="body">גוף</option>
      <option value="connection">קשר</option>
    </select>
    <select class="filter-select" id="filterSource" onchange="renderCards()">
      <option value="">כל המקורות</option>
      <option value="book">ספר</option>
      <option value="tool">כלי מובנה</option>
      <option value="technique">טכניקה</option>
      <option value="personal">אישי</option>
    </select>
  </div>
  <div class="toolbar-right">
    <button class="btn-export btn-lesson" onclick="openLessonBuilder()">📋 בניית שיעור</button>
    <button class="btn-export" onclick="exportJSON()">⬇ ייצוא JSON</button>
    <button class="btn-export" onclick="importJSON()">⬆ ייבוא JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
  </div>
  <button class="btn-clear" onclick="clearFilters()">✕ נקה סינון</button>
  <div class="view-toggle">
    <button class="view-btn active" id="viewGrid" onclick="setView('grid')" title="תצוגת כרטיסים">⊞</button>
    <button class="view-btn" id="viewList" onclick="setView('list')" title="תצוגת רשימה">☰</button>
  </div>
</div>

<main>
  <div class="results-bar">

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">הוסף פריט חדש</div>
      <button class="modal-close" onclick="closeModal('addModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>שם הפריט *</label>
          <input type="text" id="fieldName" placeholder="שם הפעילות / כלי / מפגש">
        </div>
        <div class="form-group">
          <label>סוג פריט *</label>
          <select id="fieldType">
            <option value="activity">פעילות / תרגיל</option>
            <option value="session">מפגש שלם</option>
            <option value="tool">כלי / טכניקה</option>
            <option value="quote">ציטוט / רעיון</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>קבוצת גיל</label>
          <select id="fieldAge">
            <option value="1-3">כיתות א'–ג'</option>
            <option value="4-6">כיתות ד'–ו'</option>
            <option value="7-9">חטיבת ביניים</option>
            <option value="all">כל הגילאים</option>
          </select>
        </div>
        <div class="form-group">
          <label>מטרה</label>
          <select id="fieldGoal">
            <option value="focus">ריכוז</option>
            <option value="emotion">רגש</option>
            <option value="body">גוף</option>
            <option value="connection">קשר</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>משך (דקות)</label>
          <input type="number" id="fieldDuration" placeholder="10" min="1" max="120">
        </div>
        <div class="form-group">
          <label>מקור</label>
          <select id="fieldSource">
            <option value="book">ספר</option>
            <option value="tool">כלי מובנה</option>
            <option value="technique">טכניקה</option>
            <option value="personal">אישי</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>שם המקור / ספר</label>
        <input type="text" id="fieldSourceName" placeholder="לדוגמה: Susan Kaiser Greenland, UCLA MARC...">
      </div>
      <div class="form-group">
        <label>תיאור קצר</label>
        <input type="text" id="fieldSummary" placeholder="משפט אחד שמסביר במה מדובר">
      </div>
      <div class="form-group">
        <label>תוכן מלא / הוראות / הערות</label>
        <textarea id="fieldContent" placeholder="הוראות הפעילות, הטקסט המלא, הסקריפט, ציטוט..."></textarea>

      <div class="form-group">
        <label>תגיות חופשיות (מופרדות בפסיק)</label>
        <input type="text" id="fieldTags" placeholder="נשימה, RAIN, הקשבה, מדיטציה...">

      <div class="form-actions">
        <button class="btn-save" onclick="saveItem()">שמור</button>
        <button class="btn-cancel" onclick="closeModal('addModal')">ביטול</button>

    </div>
  </div>
</div>

      </div>
      <div class="form-group">

        <select id="lessonGoal">

          <option value="focus">ריכוז וקשב</option>
          <option value="emotion">ויסות רגשי</option>
          <option value="body">מודעות גוף</option>
          <option value="connection">קשר ואמפתיה</option>

      </div>
      <div class="form-group">
        <label>מבנה השיעור</label>

          <option value="balanced">מאוזן — פתיחה + עיקרי + סגירה</option>

      <div style="text-align:center;margin:16px 0">

      <div id="lessonResult" style="display:none">
        <div style="border-top:2px solid var(--border);padding-top:20px;margin-top:4px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <div style="font-weight:700;font-size:16px;color:var(--ink)">📄 תכנית השיעור</div>
            <div style="display:flex;gap:8px">

            </div>
          </div>
          <div id="lessonPlan"></div>
        </div>
      </div>
    </div>
  </div>
</div>

function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

// ── CONFIG ──────────────────────────────────────────────────
const TYPE_CONFIG = {
  activity: { label: 'פעילות', accent: '#5c7a5c', class: 'tag-activity' },
  session:  { label: 'מפגש שלם', accent: '#4a7a9b', class: 'tag-session' },
  tool:     { label: 'כלי / טכניקה', accent: '#c8883a', class: 'tag-tool' },
  quote:    { label: 'ציטוט / רעיון', accent: '#7a6a9b', class: 'tag-quote' }
};

const AGE_CONFIG = {
  '1-3': { label: "א'–ג'", class: 'tag-age1' },
  '4-6': { label: "ד'–ו'", class: 'tag-age2' },
  '7-9': { label: 'חטיבה', class: 'tag-age3' },
  'all': { label: 'כל הגילאים', class: 'tag-age1' }
};

const GOAL_CONFIG = {
  focus:      { label: 'ריכוז', class: 'tag-focus' },
  emotion:    { label: 'רגש', class: 'tag-emotion' },
  body:       { label: 'גוף', class: 'tag-body' },
  connection: { label: 'קשר', class: 'tag-connection' }
};

const SOURCE_LABELS = { book: 'ספר', tool: 'כלי', technique: 'טכניקה', personal: 'אישי' };

// ── RENDER ───────────────────────────────────────────────────
let currentView = 'grid';
let editingId = null;

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const fType = document.getElementById('filterType').value;
  const fAge  = document.getElementById('filterAge').value;
  const fGoal = document.getElementById('filterGoal').value;
  const fSrc  = document.getElementById('filterSource').value;

  return db.items.filter(item => {
    if (fType && item.type !== fType) return false;
    if (fAge  && item.age  !== fAge)  return false;
    if (fGoal && item.goal !== fGoal) return false;
    if (fSrc  && item.source !== fSrc) return false;
    if (q) {
      const hay = [item.name, item.summary, item.content, item.sourceName, ...(item.tags||[])].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderCards() {
  const filtered = getFiltered();
  const container = document.getElementById('cardsContainer');
  document.getElementById('totalCount').textContent = db.items.length;
  document.getElementById('filteredCount').textContent = filtered.length;
  document.getElementById('countDisplay').textContent = filtered.length;

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🌿</div><h3>לא נמצאו פריטים</h3><p>שנה את הסינון או הוסף פריט חדש</p></div>`;
    return;
  }

  if (currentView === 'grid') {
    container.className = 'cards-grid';
    container.innerHTML = filtered.map(renderCardGrid).join('');
  } else {
    container.className = 'cards-list';
    container.innerHTML = filtered.map(renderCardList).join('');
  }
}

function renderCardGrid(item) {
  const tc = TYPE_CONFIG[item.type] || TYPE_CONFIG.tool;
  const ac = AGE_CONFIG[item.age] || AGE_CONFIG.all;
  const gc = GOAL_CONFIG[item.goal] || GOAL_CONFIG.focus;
  const dur = item.duration ? `${item.duration} דק'` : '—';

  return `
  <div class="card" onclick="openDetail('${item.id}')">
    <div class="card-accent" style="background:${tc.accent}"></div>
    <div class="card-body">
      <div class="card-meta">
        <span class="tag ${tc.class}">${tc.label}</span>
        <span class="tag ${ac.class}">${ac.label}</span>
        <span class="tag ${gc.class}">${gc.label}</span>
      </div>
      <div class="card-title">${esc(item.name)}</div>
      <div class="card-desc">${esc(item.summary || item.content || '')}</div>
    </div>
    <div class="card-footer">
      <div class="card-duration">⏱ ${dur}</div>
      <div class="card-source">${esc(item.sourceName || SOURCE_LABELS[item.source] || '')}</div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="btn-icon" onclick="openEdit('${item.id}')" title="עריכה">✏</button>
        <button class="btn-icon delete" onclick="deleteItem('${item.id}')" title="מחיקה">🗑</button>
      </div>
    </div>
  </div>`;
}

function renderCardList(item) {
  const tc = TYPE_CONFIG[item.type] || TYPE_CONFIG.tool;
  const ac = AGE_CONFIG[item.age] || AGE_CONFIG.all;
  const gc = GOAL_CONFIG[item.goal] || GOAL_CONFIG.focus;

  return `
  <div class="card" onclick="openDetail('${item.id}')">
    <div class="card-list-inner">
      <div class="list-accent-bar" style="background:${tc.accent}"></div>
      <div class="list-content">
        <div class="list-title">${esc(item.name)}</div>
        <div class="list-tags">
          <span class="tag ${tc.class}">${tc.label}</span>
          <span class="tag ${ac.class}">${ac.label}</span>
          <span class="tag ${gc.class}">${gc.label}</span>
          ${item.duration ? `<span class="card-duration">⏱ ${item.duration} דק'</span>` : ''}
        </div>
      </div>
      <div class="card-source">${esc(item.sourceName || '')}</div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="btn-icon" onclick="openEdit('${item.id}')" title="עריכה">✏</button>
        <button class="btn-icon delete" onclick="deleteItem('${item.id}')" title="מחיקה">🗑</button>
      </div>
    </div>
  </div>`;
}

// ── MODAL: ADD / EDIT ────────────────────────────────────────
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'הוסף פריט חדש';
  ['Name','Type','Age','Goal','Duration','Source','SourceName','Summary','Content','Tags'].forEach(f => {
    const el = document.getElementById('field'+f);
    if (el) el.value = '';
  });
  document.getElementById('fieldType').value = 'activity';
  document.getElementById('fieldAge').value = '1-3';
  document.getElementById('fieldGoal').value = 'focus';
  document.getElementById('fieldSource').value = 'book';
  document.getElementById('addModal').classList.add('open');
}

function openEdit(id) {
  const item = db.items.find(i => i.id === id);
  if (!item) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'עריכת פריט';
  document.getElementById('fieldName').value       = item.name || '';
  document.getElementById('fieldType').value       = item.type || 'activity';
  document.getElementById('fieldAge').value        = item.age || '1-3';
  document.getElementById('fieldGoal').value       = item.goal || 'focus';
  document.getElementById('fieldDuration').value   = item.duration || '';
  document.getElementById('fieldSource').value     = item.source || 'book';
  document.getElementById('fieldSourceName').value = item.sourceName || '';
  document.getElementById('fieldSummary').value    = item.summary || '';
  document.getElementById('fieldContent').value    = item.content || '';
  document.getElementById('fieldTags').value       = (item.tags||[]).join(', ');
  document.getElementById('addModal').classList.add('open');
}

function saveItem() {
  const name = document.getElementById('fieldName').value.trim();
  if (!name) { showToast('חובה להזין שם'); return; }

  const item = {
    id: editingId || uid(),
    name,
    type:       document.getElementById('fieldType').value,
    age:        document.getElementById('fieldAge').value,
    goal:       document.getElementById('fieldGoal').value,
    duration:   parseInt(document.getElementById('fieldDuration').value) || 0,
    source:     document.getElementById('fieldSource').value,
    sourceName: document.getElementById('fieldSourceName').value.trim(),
    summary:    document.getElementById('fieldSummary').value.trim(),
    content:    document.getElementById('fieldContent').value.trim(),
    tags:       document.getElementById('fieldTags').value.split(',').map(t=>t.trim()).filter(Boolean),
    createdAt:  editingId ? (db.items.find(i=>i.id===editingId)||{}).createdAt : Date.now()
  };

  if (editingId) {
    const idx = db.items.findIndex(i => i.id === editingId);
    if (idx >= 0) db.items[idx] = item;
  } else {
    db.items.unshift(item);
  }

  save();
  closeModal('addModal');
  renderCards();
  showToast(editingId ? 'הפריט עודכן ✓' : 'הפריט נוסף ✓');
}

// ── MODAL: DETAIL ─────────────────────────────────────────────
function openDetail(id) {
  const item = db.items.find(i => i.id === id);
  if (!item) return;

  const tc = TYPE_CONFIG[item.type] || TYPE_CONFIG.tool;
  const ac = AGE_CONFIG[item.age] || AGE_CONFIG.all;
  const gc = GOAL_CONFIG[item.goal] || GOAL_CONFIG.focus;

  document.getElementById('detailTitle').textContent = item.name;
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-tags">
      <span class="tag ${tc.class}">${tc.label}</span>
      <span class="tag ${ac.class}">${ac.label}</span>
      <span class="tag ${gc.class}">${gc.label}</span>
    </div>
    <div class="detail-meta-row">
      ${item.duration ? `<div class="detail-meta-item"><div class="detail-label">משך</div><div class="detail-meta-value">⏱ ${item.duration} דקות</div></div>` : ''}
      <div class="detail-meta-item"><div class="detail-label">מקור</div><div class="detail-meta-value">${esc(item.sourceName || SOURCE_LABELS[item.source] || '—')}</div></div>
      ${item.tags?.length ? `<div class="detail-meta-item"><div class="detail-label">תגיות</div><div class="detail-meta-value" style="font-size:13px;font-weight:400">${item.tags.map(t=>`<span class="tag" style="background:var(--sage-pale);color:var(--sage)">${esc(t)}</span>`).join(' ')}</div></div>` : ''}
    </div>
    ${item.summary ? `<div class="detail-section"><div class="detail-label">תקציר</div><div class="detail-text" style="font-style:italic;color:var(--ink-muted)">${esc(item.summary)}</div></div>` : ''}
    ${item.content ? `<div class="detail-section"><div class="detail-label">תוכן מלא</div><div class="detail-text">${esc(item.content)}</div></div>` : ''}
    <div class="form-actions" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
      <button class="btn-save" onclick="closeModal('detailModal');openEdit('${id}')">✏ ערוך</button>
      <button class="btn-cancel" onclick="closeModal('detailModal')">סגור</button>
    </div>
  `;
  document.getElementById('detailModal').classList.add('open');
}

// ── DELETE ───────────────────────────────────────────────────
function deleteItem(id) {
  if (!confirm('למחוק פריט זה?')) return;
  db.items = db.items.filter(i => i.id !== id);
  save();
  renderCards();
  showToast('הפריט נמחק');
}

// ── UTILS ────────────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function setView(v) {
  currentView = v;
  document.getElementById('viewGrid').classList.toggle('active', v==='grid');
  document.getElementById('viewList').classList.toggle('active', v==='list');
  renderCards();
}
function clearFilters() {
  ['filterType','filterAge','filterGoal','filterSource'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('searchInput').value = '';
  renderCards();
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(db, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mindfulness-db.json';
  a.click();
  showToast('ייצוא הושלם ✓');
}

function importJSON() { document.getElementById('importFile').click(); }

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const imported = JSON.parse(evt.target.result);
      if (imported.items && Array.isArray(imported.items)) {
        if (confirm(`ייבא ${imported.items.length} פריטים? (יאוחד עם המאגר הנוכחי)`)) {
          const existIds = new Set(db.items.map(i=>i.id));
          const newItems = imported.items.filter(i => !existIds.has(i.id));
          db.items = [...db.items, ...newItems];
          save();
          renderCards();
          showToast(`יובאו ${newItems.length} פריטים חדשים ✓`);
        }
      } else { showToast('קובץ לא תקין'); }
    } catch { showToast('שגיאה בקריאת הקובץ'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

    { id: uid(), name: 'Daily Practice 1A: קשב לצליל הפעמון', type: 'activity', age: '1-3', goal: 'focus', duration: 5, source: 'book', sourceName: src, summary: 'מדיטציית ריכוז (samatha): הילדים מקשיבים לצליל הפעמון, מרימים יד כשהוא מתחיל ומורידים כשהוא שוקט', content: 'מתי: קבוצה גדולה/קטנה, בחוץ; לילדים חדשים למדיטציה ו/או שמתקשים להתרכז.\n\n1. הדגם את צליל הפעמון — איך הוא מתחיל ואז דועך לשקט.\n2. דבר על "קשב": כשאנחנו ממשיכים לשים לב לצליל — אנחנו מתרכזים בו.\n3. בקש מהילדים להרים יד כשהצליל מתחיל ולהוריד כשהפעמון שקט.\n4. חזור לפי עניין הילדים, הגדל חזרות ככל שהיכולת גדלה.\n\nווריאציה: הרם יד כשהפעמון מתחיל ושים אצבע על האף כשהוא שוקט. לקושי מוגבר: חכה כשהפעמון מצלצל, הגיב רק כשהוא שוקט.\n\nחומרים: פעמון\nכישורים: הקשבה, מודעות, ריכוז, שליטה עצמית', tags: ['מדיטציה', 'פעמון', 'ריכוז', 'OMPK'], createdAt: Date.now() },
    { id: uid(), name: 'Daily Practice 1B: נשימה עם כדור נשימה (Hoberman Sphere)', type: 'activity', age: '1-3', goal: 'focus', duration: 5, source: 'book', sourceName: src, summary: 'מדיטציית נשימה מודרכת — הילדים נושמים בהתאם לפתיחה וסגירה של כדור המתרחב', content: 'מתי: לילדים שמתקשים בריכוז אך נהנים מחפצים חדשים ומעניינים.\n\n1. הדגם כיצד "כדור הנשימה" נפתח ונסגר.\n2. הסבר: כשהכדור נפתח — שואפים פנימה והבטן מתרחבת. כשנסגר — נושפים והבטן מתכווצת.\n3. חזור לפי עניין הילדים.\n\nווריאציות:\n- העבר הכדור כך שכל ילד יוביל את הנשימה.\n- ללא ציוד: השתמש בגוף שלך — התכווץ לכדור ואז התרחב עם הידיים מעל הראש בשאיפה.\n- Slinky: ילדים מחזיקים slinky ומותחים בשאיפה, מכווצים בנשיפה.\n\nחומרים: Hoberman sphere / slinky\nכישורים: ריכוז, שליטה בגוף, מעקב אחר הוראות', tags: ['נשימה', 'כדור נשימה', 'ריכוז', 'OMPK'], createdAt: Date.now() },
    { id: uid(), name: 'Daily Practice 2: "Are You Present for Me?" — נוכחות הדדית', type: 'tool', age: '1-3', goal: 'connection', duration: 3, source: 'book', sourceName: src, summary: 'ילדים לומדים לבקש ולתת נוכחות מלאה — "להיות נוכח" = להסתכל, להקשיב, לפנות גוף ולהפסיק פעילות אחרת', content: 'מתי: בקצב היום כשמתעורר הצורך; כשמורה/ילד רוצה לבקש קשב מלא.\n\nבהיכרות ראשונה:\n1. הדגם מה פירוש "נוכחות": שחק שאתה בטלפון ובקש מילד לשאול שאלה תוך כדי שאתה מוסח.\n2. הסבר: "להיות נוכח" = לסתכל לכיוון האדם, להקשיב, לפנות גוף ולהפסיק פעילות — כדי שהלב והמוח יהיו פתוחים.\n3. לימד את הביטוי: "Are you present for me?" ("האם אתה נוכח בשבילי?")\n4. מורה עונה: "Yes, I\'m present for you" — או: "I\'ll be present for you in one minute" אם עסוק.\n5. תרגלו: ילדים מתרגלים לבקש נוכחות ולהמתין.\n\nכישורים: קשר, הקשבה פעילה, ויסות רגשי, אמפתיה', tags: ['נוכחות', 'קשר', 'הקשבה', 'OMPK'], createdAt: Date.now() },
    { id: uid(), name: 'Daily Practice 3: תרגילי פעמון', type: 'tool', age: '1-3', goal: 'focus', duration: 3, source: 'book', sourceName: src, summary: 'הפעמון כאות לנוכחות: כל יום הוראה אחרת — לעצור, לנוע, להתחבר. "במקום לצעוק — השתמש בפעמון!"', content: 'מתי: תחילת יום, מעברים, בחוץ, ניהול כיתה.\n\n1. הזכר לילדים: מטרת הפעמון — תרגול נוכחות וצמיחת מוח לשליטה עצמית.\n2. הסבר מה יקרה היום כשהפעמון יצלצל (משתנה יומית/שבועית).\n3. צלצל בפעמון מספר פעמים ביום בהקשרים שונים.\n\nדוגמאות לפי מטרה:\n- שליטה עצמית: עצור ועמוד על רגל אחת כשהפעמון מצלצל.\n- תנועה איטית: עבור לאט ככל האפשר כשהפעמון מצלצל.\n- Stop & Go: נוע כשנשמע, עצור כששוקט.\n- ריכוז: מבט מקובע על נקודה מרגע הצלצול עד שהפעמון שוקט.\n- עוצמת קול: שנה עוצמת דיבור לפי אות הפעמון.\n\nכישורים: שליטה עצמית, ריכוז, מעברים', tags: ['פעמון', 'שליטה עצמית', 'מעבר', 'OMPK'], createdAt: Date.now() },
    { id: uid(), name: 'Daily Practice 4: יוגה ומודעות גוף', type: 'activity', age: '1-3', goal: 'body', duration: 10, source: 'book', sourceName: src, summary: 'תנוחות יוגה יומיות לחיזוק שלווה עצמית, מודעות גוף, נשימה ואיזון — מתאים למעברים, המתנה ופעילות בחוץ', content: 'מתי: יומי — קבוצה גדולה/קטנה, מעברים, בחוץ.\n\n1. בחר תנוחה לפי המיקום (שכיבה/ישיבה/עמידה) ולפי המטרה (הרגעה, איזון, לחיצת משקל).\n2. שנה את התנוחה לפי הצורך (הרגעה, ריכוז, כיף).\n3. שלב משחק ומודעות חושית — בדוג: שאף ואז נשוף עם צלילי כלב נושף.\n4. השתמש בתנוחות כאסטרטגיית המתנה או מעבר.\n\nדוגמאות לפי מטרה:\n- הרגעה: child\'s pose, שכיבת גב עם ברכיים לחזה\n- איזון: tree pose, eagle pose\n- אנרגיה: warrior pose, downward dog\n\nחומרים: כרטיסי יוגה (appendix E בספר)\nכישורים: מודעות גוף, הרגעה, נשימה, איזון', tags: ['יוגה', 'גוף', 'הרגעה', 'OMPK'], createdAt: Date.now() },
    { id: uid(), name: 'Daily Practice 5: Feelings Finder — מזהה הרגשות', type: 'tool', age: '1-3', goal: 'emotion', duration: 5, source: 'book', sourceName: src, summary: 'כלי רב-חושי לזיהוי, שיום, הבעה וויסות רגשות — לוח מגנטי עם פרצופים, כרטיסים ופסי גודל לעוצמת הרגש', content: 'מתי: לאורך היום — בכניסה, בעת מצוקה, כ"צ\'ק-אין" קבוצתי.\n\nכלים: לוח Feelings Finder (מגנטי/נייר/אלקטרוני), כרטיסי דמויות, פסי גודל.\n\nאיך:\n1. הצג פרצוף/דמות המתאימה לרגש הנוכחי.\n2. שוחח על ביטוי פנים, תנוחת גוף, קול.\n3. ילד מצביע על הרגש שהוא מרגיש.\n4. אם הילד נסער מדי — השתמש בפסי הגודל לציון עוצמה.\n\nווריאציה קבוצתית: כרטיסי הדמויות ככ"צ\'ק-אין רגשות" — כל ילד מניח כרטיס על הרגש שלו.\n\nכישורים: מודעות רגשית, ויסות, תקשורת, פרספקטיבה', tags: ['רגש', 'Feelings Finder', 'ויסות', 'OMPK'], createdAt: Date.now() },
    { id: uid(), name: 'Daily Practice 6: Super Me — הכרה בהתנהגות פרו-סוציאלית', type: 'tool', age: '1-3', goal: 'connection', duration: 5, source: 'book', sourceName: src, summary: 'כלי ויזואלי להכרה וחיזוק 12 "כוחות על" פרו-סוציאליים — עזרה, חלוקה, חמלה, ויסות, אומץ ועוד', content: 'מתי: בקצב היום כשמתעורר הצורך; בעבודה קבוצתית/אישית.\n\n1. כשילד בוחר התנהגות חיובית — הכר את הפעולה ספציפית וסמן על כרטיס/פוסטר המתאים:\n"ראיתי שחלקת עם תום כשאתה עצמך רצית את הצעצוע. זה כוח של חמלה!"\n2. אפשר לילד לבחור "כוח העל של היום" כהצבת כוונה בבוקר.\n\nווריאציה: בפעילות יצירה — ילדים מציירים את עצמם עם הכוח שלהם.\n\n12 כוחות על: עזרה, חלוקה, סבלנות, עידוד, נדיבות, אמפתיה, גמישות, תקשורת, יצירתיות, אומץ, אחריות, ויסות עצמי.\n\nחומרים: Super Me Classroom Poster, Superpower Small Cards\nכישורים: פרו-סוציאליות, חמלה, מודעות עצמית', tags: ['Super Me', 'פרו-סוציאלי', 'חיזוק', 'OMPK'], createdAt: Date.now() },
    { id: uid(), name: 'Daily Practice 7: Loving-Kindness — אהבה טובה', type: 'activity', age: '1-3', goal: 'connection', duration: 3, source: 'book', sourceName: src, summary: 'שליחת אהבה טובה לעצמם ולאחרים: "May you be happy, may you be healthy, may you be loved"', content: 'המילים: "May you be happy, may you be healthy, may you be loved"\n(עברית: "שתהיה שמח, שתהיה בריא, שתהיה אהוב")\n\nאפשרות 1 — ברכת בוקר:\nמתי: מפגש בוקר, קבלת אורח.\n1. הצג בקצרה ובקש לשלוח אהבה טובה אחד לשני.\n2. שוחח: לפעמים אורחים חדשים מרגישים ביישנים — מילים טובות עוזרות להם להרגיש בטוחים.\n3. ילדים מחזיקים ידיים ואומרים את המילים.\n\nאפשרות 2 — פרידה:\nמתי: סוף יום, פרידה מאורח — שלחו אהבה טובה כקבוצה.\n\nאפשרות 3 — כלפי עצמי:\nמתי: כשילד מתמודד עם קושי.\n1. ילד מניח יד על לב ואומר לעצמו: "May I be happy, may I be healthy, may I be loved."\n\nכישורים: חמלה, קבלה, קשר, ברכה חברתית', tags: ['Loving-Kindness', 'חמלה', 'קשר', 'OMPK'], createdAt: Date.now() },
    { id: uid(), name: 'Daily Practice 8: תרגול הכרת תודה ואחדות הכל', type: 'activity', age: '1-3', goal: 'connection', duration: 5, source: 'book', sourceName: src, summary: 'טיפוח יחס של הכרת תודה — לגלות כמה גורמים תורמים לדבר פשוט (כגון גזר), ולבטא תודה לאנשים ולטבע', content: 'מתי: לפני ארוחה/חטיף, בדיון על אוכל, חקלאות.\n\nאפשרות 1 — הכרת תודה על אוכל:\n1. לפני ארוחה: ילדים אומרים דבר אחד שהם אסירי תודה עליו. עודד לבטא תודה ל"מי" או ל"מה" שסייע.\n2. מודל: "אני אסיר תודה למי שגידל את הגזר — לשמש, לגשם, לחקלאי, לנהג, לקופאי..."\n3. הוביל שיחה: "כמה דברים היו צריכים לקרות כדי שהגזר הזה יגיע לצלחת שלך?"\n\nאפשרות 2 — הכרת תודה על מצבים קשים:\nמתי: כשילד מביע תסכול.\n"מה אפשר ללמוד ממצב זה? האם יש משהו בו שאנחנו יכולים להיות אסירי תודה עליו?"\n\nכישורים: הכרת תודה, אחדות הכל, פרספקטיבה', tags: ['הכרת תודה', 'חמלה', 'אחדות', 'OMPK'], createdAt: Date.now() },
    { id: uid(), name: 'Daily Practice 9: דיווח על חמלה ואדיבות ("אנטי-נדנוד")', type: 'activity', age: '1-3', goal: 'connection', duration: 5, source: 'book', sourceName: src, summary: 'ילדים מדווחים ומציינים מעשי אדיבות של אחרים — ומקבלים תשומת לב חיובית על כך במקום על נדנוד', content: 'מתי: קבוצה גדולה, בסוף פעילות שדרשה שיתוף פעולה.\n\n1. לאורך היום: הדגם הכרה במעשה אדיב עם פרטים ספציפיים:\n"היום שמתי לב שאומרי אסף את כל הצבעים שסטייסי הפילה. תודה שהיית כל כך אמפתי, אומרי!"\n2. אם ילד מדווח על מעשה שעשה בעצמו — חזק ואז שאל: "האם שמת לב למישהו אחר שעשה משהו טוב?"\n3. בקש מהילדים לשתף תצפיות על אחרים שפעלו באדיבות.\n\nעקרון: ילדים מקבלים תשומת לב על דיווח חיובי — לא שלילי. מחליף בהדרגה את "הנדנוד" בתשומת לב לטוב.\n\nכישורים: אמפתיה, חמלה, הכרת תודה, מיקוד בחיובי', tags: ['חמלה', 'אדיבות', 'OMPK', 'Anti-tattling'], createdAt: Date.now() },
    { id: uid(), name: 'Daily Practice 10: Soles of the Little Feet — כפות הרגלים הקטנות', type: 'tool', age: '1-3', goal: 'emotion', duration: 5, source: 'book', sourceName: src, summary: 'הזזת קשב מרגש קשה (כעס, פחד) למקום נייטרלי — גרסת ילדים לתרגול Soles of the Feet של ד"ר Nirbhay Singh', content: 'מטרה: ללמד ילדים להזיז קשב מרגש קשה למקום נייטרלי.\n\nחלק 1 — שיר "Big Feelings, Small Bodies":\nמתי: קבוצה גדולה/קטנה; כשילדים אוהבים שירה ותנועה.\n1. הסבר: "לפעמים יש לנו רגשות גדולים. זה בסדר כל עוד לא פוגעים בעצמנו או באחרים."\n2. אנלוגיה: "לפעמים אנחנו מלאי כעס וזה מרגיש חם — כמו מים חמים בכוס. בסדר שהכעס יהיה חם, אבל נסו לא לשפוך אותו על אנשים!"\n3. שירו את השיר עם תנועות ותגובות call-and-response.\n\nחלק 2 — פרוטוקול Soles of the Feet:\nמתי: כשילד חווה רגש קשה.\n1. "שים לב לרגש שאתה מרגיש עכשיו."\n2. "עכשיו הזז את הקשב לכפות הרגליים שלך. איך הן מרגישות — קרות, חמות, רכות?"\n3. נשום ושים לב לכפות הרגליים עד שהרגש הקשה מאבד עוצמה.\n4. "עכשיו מה אתה מרגיש?"\n\nכישורים: ויסות רגשי, הזזת קשב, שחרור רגש קשה', tags: ['Soles of the Feet', 'ויסות רגשי', 'כעס', 'OMPK'], createdAt: Date.now() }

  const items = [
    { id: uid(), name: 'משחק הברווזים', type: 'activity', age: '1-3', goal: 'focus', duration: 5, source: 'book', sourceName: src, summary: 'משחק חיקוי: הידיים הופכות לברווזים — משחקים, נפגשים, מתמתחים, מתגלגלים ועוצרים. שמים לב לדופק ולנשימה ברגע העצירה.', content: 'אצבע ואגודל נפגשות — כל כף יד הופכת לברווז.\n\nהברווזים:\n- משחקים, נפגשים ומתרחקים (ידיים מתקרבות ומתרחקות)\n- עולים הכי גבוה ויורדים הכי נמוך (ידיים נעות מעלה ומטה)\n- מתמתחים (ידיים ואצבעות נמתחות לצדדים)\n- מתגלגלים (ידיים נעות במעגלים)\n- עוצרים\n\nשמים לב לרגע העצירה: האם קצב דפיקות הלב מהיר יותר? איך הנשימה?\n\nלסיום: הברווזים העייפים נפגשים — נותנים נשיקה, מתחבקים (אצבעות משתלבות), נחים על הבטן — שמים לב לתחושת הנשימה, כמו גלים.', tags: ['תנועה', 'ידיים', 'נשימה', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'משחק הפסלים', type: 'activity', age: '1-3', goal: 'focus', duration: 5, source: 'book', sourceName: src, summary: 'ילדים יושבים כמו פסלים — בכל פעם מזיזים רק חלק אחד בגוף בזמן ששאר הגוף נשאר יציב. "אני יציב.ה כמו פסל"', content: 'מזמינים את הילדים לשבת כמו פסלים שלא זזים.\n\nבכל פעם מזיזים רק חלק אחד בגוף:\n- רק אצבעות כפות הרגליים\n- רק אצבעות כפות הידיים\n- רק הזרת ביד שכותבת\n- רק הכתפיים\n\nשאלות: האם נצליח להזיז רק את העיניים? רק את הלשון בתוך הפה?\n\nבזמן ששאר חלקי הגוף לא זזים — נזיז את הגוף רק על ידי הנשימה. ניקח נשימות עמוקות ונראה אילו איברים זזים מהנשימה בלבד.\n\nאומרים בלב: "אני יציב.ה כמו פסל".', tags: ['גוף', 'עצירה', 'קשב', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'עמידת הר', type: 'activity', age: '1-3', goal: 'body', duration: 3, source: 'book', sourceName: src, summary: 'עמידה ללא תנועה עם דגש על יציבות — כפות רגליים מקורקעות, קודקוד לשמיים, מבט של ביטחון. "אני חזק.ה ויציב.ה כמו הר"', content: 'עומדים עמידה ללא תנועה עם דגש על יציבות.\n\n1. נתמקד בנקודה בחדר ונשאיר עליה את המבט.\n2. כפות הרגליים מקורקעות לרצפה.\n3. הכתפיים מתגלגלות לאחור.\n4. הידיים צמודות לגוף ושלוחות למטה כמו חיצים.\n5. קודקוד הראש רוצה להגיע לשמיים.\n6. הסנטר יורד מעט והעורף מתארך.\n7. העיניים נחות על נקודת המיקוד ומשדרות מבט של יציבות ובטחון.\n\nאומרים בלב: "אני חזק.ה ויציב.ה כמו הר". חשים חוזק ויציבות בגוף.\n\nעוברים בין הילדים, נוגעים בעדינות, ותומכים ביצירת תחושת יציבות פנימית.', tags: ['גוף', 'יציבות', 'כוונה', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'עמידת עץ', type: 'activity', age: '1-3', goal: 'body', duration: 5, source: 'book', sourceName: src, summary: 'עמידה על רגל אחת כגזע עם שורשים — ידיים מחוברות ללב, הרגל השנייה מתחברת לגזע, ידיים מתמתחות לשמש. "כמו עץ ברוש"', content: 'מתחילים בעמידת הר.\n\n1. בוחרים רגל אחת ומעבירים אליה את כל משקל הגוף — גזע ששולח שורשים לאדמה.\n2. מוצאים נקודת יציבות ומניחים שתי כפות הידיים יחד אל הלב.\n3. לאט מנתקים מהרצפה את הרגל השנייה (ענף) ומחברים אותה לרגל הראשונה (הגזע) במקום שהכי נוח.\n4. כשמגיעים ליציבות — לוקחים נשימה ומותחים ידיים למעלה לכיוון התקרה (השמש).\n5. עכשיו אנחנו כמו עץ ברוש.\n6. חוזרים לעמידת הר. אפשר לבצע גם ברגל השנייה.', tags: ['יוגה', 'איזון', 'גוף', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'התמתחות', type: 'activity', age: '1-3', goal: 'body', duration: 3, source: 'book', sourceName: src, summary: 'מתמתחים/מנערים את הגוף בסימון צליל — עוצרים כמו פסלים כשהצליל מפסיק. שמים לב היכן מרגישים את המתיחה.', content: 'נתמתח או ננער את חלקי הגוף בסימון צליל שנבחר.\n\nכל עוד שומעים צליל:\n- מתמתחים או מנערים את הגוף\n- משלבים ידיים זו בזו ונמתחים\n- מותחים יד אחת ואחריה השנייה\n- נעמדים ומנערים את כל אברי הגוף\n- זזים בכסא ונמתחים\n\nברגע שהצליל מפסיק — עוצרים כמו פסלים, או מותחים ידיים למעלה ועומדים על קצות האצבעות.\n\nשמים לב היכן מרגישים את המתיחה: בכתפיים, בזרועות, בגב, במותניים, ברגליים?\n\nלוקחים נשימה עמוקה וחוזרים לשבת.', tags: ['מתיחה', 'גוף', 'עצירה', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'לתופף על הגוף', type: 'activity', age: '1-3', goal: 'body', duration: 5, source: 'book', sourceName: src, summary: 'מתופפים על הגוף מכפות הרגליים עד קודקוד — מקשיבים לצלילים שונים ושמים לב היכן נעים תיפוף חזק ואיפה עדין', content: 'מתופפים על הגוף מכפות הרגליים ועד קודקוד הראש.\n\n1. לא מדברים — רק מקשיבים לצלילים השונים שהתיפוף עושה:\n   כפות רגליים → שוקיים → ירכיים → ישבן → בטן → גב → חזה → זרועות → כתפיים → פנים → ראש\n\n2. עושים שוב ושמים לב: איפה נעים תיפוף חזק? איפה תיפוף עדין?\n\n3. מתופפים רק על הבטן כתזמורת — המורה מסמן.ת כמה להגביר וכמה להחליש.\n\n4. חוזרים לישיבה ומתופפים עם קצות האצבעות על הפנים: מצח, לחיים, סנטר.\n\n5. עוצרים לרגע שקט, עוצמים עיניים ולוקחים כמה נשימות עמוקות.\n\nלסיום: פוקחים עיניים ושמים לב "איך אני מרגיש.ה עכשיו".', tags: ['גוף', 'צלילים', 'קשב', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'משחק הפסטה', type: 'activity', age: '1-3', goal: 'body', duration: 5, source: 'book', sourceName: src, summary: 'ויזואליזציה של הרפיית גוף: מדמיינים שהגוף הופך לפסטה רכה מתוך אמבטיה חמה — המורה הוא "המזלג" שבודק', content: 'כשקונים פסטה היא קשה, קרה ולא גמישה. כשרוצים להכין אותה מבשלים במים רותחים ובהדרגה היא מתרככת. היום בדמיון נהפוך את הגוף שלנו לפסטה רכה ומוכנה.\n\n1. מניחים את הראש על השולחן.\n2. מאפשרים לגוף לנוח ובעדינות עוצמים עיניים.\n3. מדמיינים שאנחנו בתוך אמבטיה חמה ומפנקת.\n4. הגוף מתחיל להיות רך: הרגליים מתרככות → הידיים → הפנים → הכתפיים נחות → הגב מתרכך.\n\n"עכשיו נשחק: אני אהיה המזלג, אעבור ביניכם ואגע בכם כדי להרגיש אם הפסטה מוכנה. מי פסטה רכה ומוכנה?"', tags: ['הרפיה', 'ויזואליזציה', 'גוף', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'הקשבה קשובה בזוגות', type: 'activity', age: '4-6', goal: 'connection', duration: 8, source: 'book', sourceName: src, summary: 'אחד.ת מדבר.ת והשני.ה מקשיב.ה מבלי להגיב — "שתי אוזניים": אחת לחבר, אחת לעצמי. אחר כך מתחלפים ומשתפים.', content: 'לפני שמתחילים המורה מחלק לזוגות ומספר על הנושא.\n\nהקשבה היא מבלי להגיב, לענות או לתת עצה — הקשבה מלאה.\n\nמקשיבים "בשתי אוזניים":\n- אוזן אחת לחבר.ה: מה הוא/היא אומר.ת ומרגיש.ה?\n- אוזן שנייה לעצמי: מה קורה לי בפנים כשאני מקשיב.ה?\n\nלאחר שתי דקות מתחלפים.\n\nבסוף משתפים בזוגות:\n- איך היה לי רק להקשיב? רק לדבר?\n- מה היה לי נעים? מה היה קשה?\n- איך התרגיל יכול לעזור בחיים?\n\nנושאי שיחה אפשריים: משהו משמח שקרה היום / הצלחה שחוויתי לאחרונה / משהו שקשה לי / מתי הרגשתי שמקשיבים לי באמת.', tags: ['הקשבה', 'זוגות', 'קשר', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'להסתכל בעיניים — הקשבה ללא מילים', type: 'activity', age: '4-6', goal: 'connection', duration: 5, source: 'book', sourceName: src, summary: 'מתבוננים אחד.ת בשני.ה בעיניים טובות, שולחים חיוך, מקשיבים ללא מילים — לסיום מאחלים משהו טוב', content: 'תרגיל בזוגות. אפשר להתחיל בזמן קצר ובהדרגה להאריך.\n\n1. להתבונן אחד.ת בשני.ה בעיניים טובות.\n2. לשלוח חיוך.\n3. להקשיב ללא מילים.\n4. לקראת סיום להניח יד על הלב שלי ולאחל לחבר.ה משהו טוב ליום הזה.\n\nאחרי הפעילות שואלים:\n- אילו תחושות גוף עלו? אילו רגשות?\n- האם יש משהו חדש ששמתי לב אליו אצל החבר.ה?\n- האם רק מהתבוננות בפנים ושפת הגוף מרגישים מה קורה אצל האחר?', tags: ['קשר', 'הקשבה', 'אמפתיה', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'משחק המראה בזוגות', type: 'activity', age: '1-3', goal: 'connection', duration: 5, source: 'book', sourceName: src, summary: 'אחד.ת מוביל.ה בתנועות עדינות ובן.ת הזוג עושה כמוהו.ה כמו מראה — עם פעמון מתחלפים', content: 'נעמדים בזוגות.\n\n1. ילד.ה אחד.ת מוביל.ה בתנועות עדינות.\n2. בן.ת הזוג עושה בדיוק כמוהו.ה — כמו מראה.\n3. שמים לב לתנועות קטנות, לצדדים, לכיוונים.\n4. עם צלצול פעמון מתחלפים.\n\nאפשר להציע נושאים שונים:\n- תנועות קטנות / תנועות איטיות / תנועות עם איבר מסוים / תנועות פנים\n\nבסוף: מה היה לי יותר נעים — להוביל או להיות מראה? מה נעים בכל אחד מהמצבים?', tags: ['זוגות', 'קשר', 'קשב', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'מעגל הקשבה כיתתי', type: 'activity', age: '4-6', goal: 'connection', duration: 10, source: 'book', sourceName: src, summary: 'יושבים במעגל עם חפץ דיבור — רק מי שאוחז רשאי לדבר. ארבע כוונות: לדבר מהלב / להקשיב מהלב / ספונטניות / התאמה.', content: 'יושבים במעגל עם חפץ דיבור — רק מי שאוחז בחפץ רשאי לדבר.\n\nלפני שמתחילים מזכירים ארבע כוונות:\n1. לדבר מהלב — להיות כנ.ה ולומר את האמת בגוף ראשון.\n2. להקשיב מהלב — ללא שיפוט וביקורת.\n3. לדבר בספונטניות — מתוך הרגע הזה, ללא תכנון מוקדם.\n4. לדבר בהתאמה — בהתאם לזמן וגודל הקבוצה.\n\nהאוחז.ת מדבר.ת, האחרים מקשיבים הקשבה מלאה מבלי לתת עצה או להגיב. אין חובה לדבר.', tags: ['מעגל', 'הקשבה', 'כיתה', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'חבר לא אוטומטי', type: 'activity', age: '4-6', goal: 'connection', duration: 10, source: 'book', sourceName: src, summary: 'עובדים בזוג עם ילד.ה שלא רגילים להיות איתו.ה — ההזמנה בחיוך ובהושטת יד, וקבלת ההזמנה באדיבות', content: 'חבר.ה לא אוטומטי.ת הוא/היא חבר.ה שאני לא רגיל.ה להיות איתו.ה.\n\nלכולנו חברים שאנחנו רגילים לבלות איתם — ויחד עם זאת יש עוד ילדים שאנחנו פשוט לא רגילים להיות איתם, ולכן בהתחלה יש תחושה מוזרה.\n\nהמורה עובר.ת — מי שנוגעים בראשו.ה ייגש להזמין חבר.ה לא אוטומטי.ת בחיוך ובהושטת יד.\n\nייתכן שהמוזמן.ת יהיה קצת מאוכזב.ת. ולמרות זאת — התפקיד של המוזמן.ת הוא לתת תחושה שמקבלים את ההזמנה באדיבות: מחייכים, קמים ומצטרפים.\n\nאחרי האיחוד — עושים תרגיל מהמניפה, יוצרים ציור משותף, או עובדים בזוגות בחומר הלימוד.', tags: ['קשר', 'פתיחות', 'חברות', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'כוס מים על הראש', type: 'activity', age: '4-6', goal: 'body', duration: 3, source: 'book', sourceName: src, summary: 'מדמיינים שמניחים כוס מלאת מים על הראש — שומרים על יציבות ומשחררים ידיים, שמים לב ליציבות הגוף', content: 'מדמיינים שמחזיקים ביד כוס מלאה במים.\n\n1. לוגמים ממנה.\n2. מניחים אותה על הראש.\n3. משתדלים לשמור על יציבות ומשחררים את הידיים — הכוס הדמיונית נשארת על הראש.\n4. שמים לב ליציבות הגוף.\n5. שולחים יד ומורידים את הכוס מהראש.\n6. לוגמים פעם נוספת.\n7. מניחים את הכוס הדמיונית על השולחן וחוזרים ללמוד.', tags: ['עצירה', 'גוף', 'יציבות', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'פרח ונר', type: 'activity', age: '1-3', goal: 'focus', duration: 3, source: 'book', sourceName: src, summary: 'ביד אחת פרח, ביד השנייה נר — מריחים בשאיפה ומכבים את הנר בנשיפה. אפשר לבחור צבעים ועוצמות שונות.', content: 'מדמיינים שביד אחת פרח יפה וביד השנייה נר.\n\n1. מריחים את הפרח תוך כדי שאיפת אוויר.\n2. מכבים את הנר תוך כדי נשיפה.\n\nניתן לבחור צבעים לפרח ולנר.\nניתן להתנסות:\n- להריח זר פרחים ולכבות נרות רבים על עוגת יום הולדת\n- או להריח פרח קטן ורק להרעיד את הלהבה בנשיפה עדינה.', tags: ['נשימה', 'ויזואליזציה', 'עצירה', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'פעמון הקשב מצלצל', type: 'activity', age: '1-3', goal: 'focus', duration: 5, source: 'book', sourceName: src, summary: 'ארבעה תרגילים עם פעמון: ספירת צלצולים / תנועה עם צליל / הקשבה בעיניים עצומות / כפות ידיים שמתקרבות ככל שהצליל דועך', content: '1. המורה מצלצל מספר צלצולים. הילדים סופרים עם האצבעות — בסיום מסמנים בכמה אצבעות, לא מדברים, רק מראים.\n\n2. תנועה עם צליל: כששומעים — מרימים ידיים. כשלא שומעים — מורידים.\n\n3. מקשיבים לצליל בעיניים עצומות עד שנגמר ובסיום מרימים יד. חוזרים כמה פעמים בעיניים פקוחות ועצומות — בודקים אם היה הבדל.\n\n4. מחזיקים כפות ידיים זו מול זו במרחק. המורה מצלצל. ככל שהצליל חלש יותר — מקטינים את המרחק בין כפות הידיים. עד שכפות הידיים נוגעות אחת בשנייה כשלא שומעים צליל.', tags: ['פעמון', 'הקשבה', 'צלילים', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'יש לי אותי — הקשבה לתחושות הגוף', type: 'activity', age: '4-6', goal: 'emotion', duration: 5, source: 'book', sourceName: src, summary: 'משפשפים כפות ידיים, מניחים על מקום שמבקש תשומת לב בגוף ואומרים בלב: "אני נותן.נת לעצמי תשומת לב. מגע. אהבה"', content: '1. משפשפים את כפות הידיים אחת בשנייה.\n2. מעבירים תשומת לב אל הגוף: מאתרים מקום כואב, מציק, או מתוח.\n3. מניחים כפות הידיים על המקום שמבקש תשומת לב.\n4. נושמים, מרגישים. אומרים בלב: "אני נותן.נת לעצמי תשומת לב. מגע. אהבה" — או: "יש לי אותי".\n5. מאפשרים לנשימה להגיע למקום בו הידיים מונחות.\n6. מעבירים את הידיים למקום נוסף.\n\nבפעם השלישית מניחים כפות הידיים על העיניים. נותנים לידיים לטייל בעדינות על הפנים — מצח, לחיים, לסת, לגרון.\n\nלבסוף מניחים ידיים על הלב ואומרים: "יש לי אותי, אני מקשיב.ה לעצמי".', tags: ['חמלה עצמית', 'גוף', 'קשב', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'ספירת 10 נשימות', type: 'tool', age: '1-3', goal: 'focus', duration: 3, source: 'book', sourceName: src, summary: 'מניחים יד על הבטן וסופרים 10 נשימות עם האצבעות — אצבע אחת נפתחת בכל נשיפה', content: 'סופרים 10 נשימות וממקדים תשומת לב לנשימה.\n\n1. מניחים יד על הבטן. היד חשה את האוויר שנכנס וממלא את הגוף.\n2. הבטן היא כמו בלון שמתמלא ומתרוקן.\n3. עם אצבעות היד השנייה סופרים 5 נשימות: כל האצבעות אסופות לאגרוף. בכל פעם שנושפים והבטן מתרוקנת — פותחים אצבע אחת.\n4. בשלב השני מחליפים בין הידיים.', tags: ['נשימה', 'ספירה', 'ריכוז', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'הגעתי — אני כאן', type: 'tool', age: '4-6', goal: 'focus', duration: 3, source: 'book', sourceName: src, summary: 'תרגיל נוכחות: נשימה ממוקדת עם מנטרה — בשאיפה "הגעתי", בנשיפה "אני כאן"', content: 'הגוף שלנו כאן, אבל האם אנחנו כאן גם במחשבות? בואו נביא את כל כולנו לכאן.\n\n1. כפות הרגליים על הרצפה.\n2. כתפיים מתגלגלות לאחור.\n3. הידיים נחות על הברכיים.\n4. העיניים מתמקדות בנקודה אחת בחלל, או נעצמות.\n5. העורף מתארך.\n6. מרגישים את נקודות המגע בין הגוף לכיסא.\n7. פנס הקשב ממוקד בנשימה.\n\nיחד עם הנשימה:\n- כשהאוויר נכנס — "הגעתי"\n- כשהאוויר יוצא — "אני כאן"\n\nנשלב בין המשפטים לנשימות כמה פעמים. כשמצלצל פעמון — פוקחים עיניים. האם עכשיו אנחנו כאן?', tags: ['נוכחות', 'נשימה', 'עגינה', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'הקשבה לצלילים', type: 'activity', age: '4-6', goal: 'focus', duration: 5, source: 'book', sourceName: src, summary: 'נהיים שקטים ומאזינים לצלילים שסביבנו שלא שמענו עד עכשיו — ארוכים/קצרים, נעימים/לא נעימים. כמו תזמורת צלילים.', content: 'כשיש רעש שומעים צלילים חזקים. ככל שיותר שקט שומעים צלילים יותר ויותר חלשים.\n\nבואו נהיה שקטים ונאזין לצלילים הנמצאים סביבנו שאולי לא שמענו אותם עד עכשיו.\n\nמעניין אילו צלילים נשמע?\n- ארוכים? קצרים?\n- צלילים שחוזרים על עצמם או חד פעמיים?\n- נעימים או לא נעימים, או סתם צליל שאין לי כל יחס אליו?\n- חזק או חלש?\n\nאפשר לנסות להקשיב לצלילים מבלי לחשוב ממה הם מופקים — פשוט להקשיב להם. כמו תזמורת צלילים.', tags: ['הקשבה', 'צלילים', 'קשב', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'מה קרה הבוקר? — היזכרות מהרגע שקמתי ועד עכשיו', type: 'activity', age: '4-6', goal: 'emotion', duration: 5, source: 'book', sourceName: src, summary: 'סקירה מודרכת של היום מתחילתו ועד עכשיו — עם שאלות על רגשות, אנשים, רגעים נעימים וכוונה להמשך', content: 'ניזכר ברגע שפקחנו עיניים:\n- מה הרגשנו? מי האדם הראשון שפגשנו? איך התארגנו? ואיך יצאנו מהבית?\n\nוכשהגענו לבית הספר:\n- במי פגשנו ראשון? מה הדבר הראשון שעשינו?\n- בשיעורים ובהפסקות: עם מי היינו? מה קרה? אולי היו גם רגעים לא נעימים — הם חלק מהיום.\n\nאפשר להיזכר ברגע נעים שהיה היום: מה היה שם? עכשיו כשנזכרים — איך זה מרגיש בגוף, בפנים?\n\nוהנה הגענו לעכשיו. איך אני מרגיש.ה ממש עכשיו?\n\nמה עומד לקרות בהמשך היום? למה נרצה לשים לב? מה נרצה לזכור כדי שהיום יהיה לנו נעים ומיטיב?', tags: ['הרהור', 'יום', 'רגשות', 'כוונה', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'הרהור על היום שהיה', type: 'activity', age: '4-6', goal: 'emotion', duration: 5, source: 'book', sourceName: src, summary: 'עם צלצול פעמון ראש על השולחן — שאלות להרהור: מה היה נעים/קשה, ממי למדתי, על מה אני מודה', content: 'עם צלצול הפעמון כולם מניחים ראש על השולחן ונזכרים באירועים שקרו היום.\n\nשאלות לבחור אחת או שתיים:\n- מה היה לי היום נעים?\n- מה היה קשה, או לא נעים היום?\n- עם מי היה לי נעים להיות היום?\n- מה למדתי היום שלא ידעתי קודם?\n- מה אני רוצה לזכור מהיום הזה?\n- על מה או למי אני מודה היום?', tags: ['הרהור', 'סגירה', 'הכרת תודה', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'מה עובר לי בראש? — כתיבה אינטואטיבית', type: 'activity', age: '4-6', goal: 'emotion', duration: 7, source: 'book', sourceName: src, summary: 'כותבים 5 דקות רצופות מבלי לנתק עיפרון מדף — כל מה שעולה בראש, ללא עריכה. נושאי פתיחה לבחירה.', content: 'מניחים על השולחן דף ועפרון. המורה אומר.ת משפט פתיחה פשוט.\n\nמתחילים לכתוב במשך 5 דקות מבלי לנתק את העיפרון מהדף. כותבים כל דבר שעולה בראש.\n\nדוגמאות לנושאי כתיבה:\n- מה שלומי היום?\n- איך היה לי היום הזה?\n- היום שיחקתי... / היום היה לי קשה ב...\n- יש לי סוד שכבר הרבה זמן אני שומר.ת בבטן...\n- אצלנו במשפחה עכשיו...\n- החבר.ה שלי ואני...\n- בחופשה... / בשבת... / בחוג...', tags: ['כתיבה', 'הרהור', 'רגשות', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'תודה וסליחה', type: 'activity', age: '4-6', goal: 'emotion', duration: 5, source: 'book', sourceName: src, summary: 'חושבים בלב: למי אני רוצה לומר תודה על משהו קטן? יש מישהו שאני רוצה לבקש סליחה? לסיום — חיוך פנימי ישר ללב.', content: 'נזכרים ביום שהיה — היו בו רגעים נעימים יותר ונעימים פחות. גם אני, בחלק מהזמן, הייתי במיטבי ובחלקו פחות.\n\n1. חושבים על מישהו.י שנרצה להגיד לו.ה בלב תודה על משהו שהיה היום, אפילו אם זה משהו קטן.\n2. חושבים האם יש מישהו.י שנרצה לבקש ממנו בלב סליחה.\n3. מה ואיפה מרגישים בגוף כשאומרים בלב תודה וסליחה?\n\nאפשר לומר לעצמי תודה על האומץ שיש בי. זה לא מובן מאליו.\n\nלסיום: מותחים את זוויות הפה לצדדים ושולחים לעצמי חיוך פנימי ישר ללב.', tags: ['הכרת תודה', 'סליחה', 'חמלה עצמית', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'קשת של הכרת הטוב', type: 'activity', age: '4-6', goal: 'emotion', duration: 10, source: 'book', sourceName: src, summary: 'מציירים קשת ובכל צבע רושמים משהו שמודים עליו — אדם, תכונה, קושי שהתגברתי, מעשה טוב, רגע כיף ועוד', content: 'מציירים קשת. בכל צבע רושמים משהו שמודים עליו:\n\n- אדום — אדם שאני שמח שנמצא בחיי\n- כתום — תכונה שיש בי אשר תורמת לאחרים\n- צהוב — קושי שהתגברתי עליו\n- ירוק — משהו שנעים לי לעשות כשאני עם עצמי\n- תכלת — משהו טוב שעשיתי עבור מישהו אחר היום\n- כחול — משהו שהתאמצתי בשבילו\n- סגול — רגע שהיה לי כיף\n\nקוראים את הדברים ושמים לב לתחושות בגוף, בפנים, בשרירים.\nשאלות: איך זה לומר לעצמי על עצמי דברים טובים? איך זה להיות חבר.ה טוב.ה של עצמי?', tags: ['הכרת תודה', 'ציור', 'חמלה עצמית', 'הפוגות סגולות'], createdAt: Date.now() },
    { id: uid(), name: 'מזג אוויר פנימי — מה שלומי עכשיו?', type: 'activity', age: '4-6', goal: 'emotion', duration: 5, source: 'book', sourceName: src, summary: 'בודקים את "מזג האוויר הפנימי": הגוף כבד או קל? הנשימה עמוקה או שטוחה? ואם היה לי חזאי פנימי — מה הוא היה אומר?', content: 'היום מקשיבים פנימה.\n\n1. לוקחים כמה נשימות עמוקות.\n2. שמים לב לגוף: כבד או קל? עייף או ערני? מכווץ או רפוי?\n3. שמים לב לנשימה: איטית או מהירה? עמוקה או שטוחה?\n4. מה שלום הפנים: מכווצים? יש מתח?\n5. שמים שתי ידיים על הלב.\n6. לוקחים נשימות עמוקות ושואלים: מה שלומי עכשיו?\n\nאם היה לי חזאי פנימי — מה הוא היה אומר שמזג האוויר אצלי?\nשמש נעימה? סערה? חמסין? רוחות קלות?\n\nושולחים חיוך פנימה.', tags: ['רגשות', 'גוף', 'מטאפורה', 'הפוגות סגולות'], createdAt: Date.now() }
  ];
  db.items = [...db.items, ...items];

(function addNewItems() {
  const newItems = [
    { id: uid(), name: 'לשבת כמו צפרדע', type: 'tool', age: '4-6', goal: 'focus', duration: 8, source: 'book', sourceName: 'Sitting Still Like a Frog — Eline Snel', summary: 'הצפרדע יכולה לקפוץ רחוק — אבל גם לשבת דומם ולשמור על האנרגיה. ילדים מתבקשים להפוך לצפרדעים ולשים לב לתנועת הבטן בנשימה.', content: 'אומרים לילדים: "צפרדע היא חיה מדהימה. היא יכולה לבצע קפיצות ענקיות, אבל היא גם יודעת לשבת דומם לחלוטין ולשמור על האנרגיה שלה. היא מודעת לכל מה שקורה סביבה, אך לא מגיבה לכל גירוי (כמו זבוב שעף). היא פשוט יושבת ונושמת."\n\nהילדים מתבקשים להפוך לצפרדעים: לשבת שקטים ודוממים ולשים לב אך ורק לתנועת הבטן שעולה ויורדת עם כל נשימה.\n\nזה עוזר לריכוז ולשליטה באימפולסיביות.', tags: ['צפרדע', 'נשימה', 'ישיבה שקטה', 'אימפולסיביות'] },
    { id: uid(), name: 'כפתור ההשהיה', type: 'tool', age: 'all', goal: 'emotion', duration: 3, source: 'book', sourceName: 'Sitting Still Like a Frog — Eline Snel', summary: 'עצירה יזומה לפני תגובה אוטומטית במצבי לחץ או כעס — ללחוץ על "כפתור השהיה" דמיוני', content: 'כשנתקלים בסיטואציה מכעיסה או מלחיצה, אנו נוטים להגיב על אוטומט.\n\nילדים לומדים ללחוץ על "כפתור השהיה" דמיוני:\n1. עצרו את כל מה שעושים.\n2. לקחו זמן להרגיש מה מתחולל בפנים — מבלי להגיב מיד.\n3. נשמו.\n4. רק לאחר שנרגעים — בחרו איך להגיב.\n\nמונע החרפה של מצבים רגשיים והתפרצויות זעם.', tags: ['השהיה', 'כעס', 'ויסות רגשי', 'תגובתיות'] },
    { id: uid(), name: 'מסוע הדאגות', type: 'tool', age: '4-6', goal: 'emotion', duration: 5, source: 'book', sourceName: 'Sitting Still Like a Frog — Eline Snel', summary: 'טכניקה נגד מחשבות טורדניות — להוריד את תשומת הלב מהראש לבטן, כמו עכביש קטן שגולש על חוט מטה', content: 'כאשר הראש מוצף במחשבות ודאגות (לפני שינה או בכל זמן):\n\n1. להבחין בכך שאתה מודאג — לתת לזה הכרה.\n2. להוריד את תשומת הלב מהראש, ממש כמו עכביש קטן שגולש על חוט מטה — אל תוך הבטן.\n\nבבטן אין מחשבות, סכסוכים או דאגות. יש רק את התנועה הרגועה של הנשימה שעולה ויורדת.\n\nמתרכזים בתנועת הנשימה בבטן עד שנרגעים.', tags: ['דאגות', 'חרדה', 'עכביש', 'נשימה בטנית', 'שינה'] },
    { id: uid(), name: 'אכילה מודעת — חייזר ממאדים', type: 'activity', age: 'all', goal: 'focus', duration: 12, source: 'book', sourceName: 'Sitting Still Like a Frog — Eline Snel / Mindful Games', summary: 'אוכלים פריט מזון אחד תוך הפעלת כל החושים — מדמיינים שהם חייזרים ממאדים שנתקלים בחפץ הזה בפעם הראשונה', content: 'מחלקים לכל ילד חתיכת מזון (צימוק, ענב, קוביית שוקולד).\nאומרים לילדים לדמיין שהם חייזרים ממאדים וזו הפעם הראשונה שהם נתקלים בחפץ הזה.\n\nשלב 1: מסתכלים עליו מקרוב — צבע, צורה, קמטים.\nשלב 2: ממששים — רך? דביק?\nשלב 3: מריחים בשאיפה עמוקה.\nשלב 4: מקרבים לאוזן וממוללים — האם יש צליל?\nשלב 5: מכניסים לפה אך לא לועסים מיד. שמים לב לתחושה על הלשון.\nשלב 6: לועסים לאט ובולעים תוך תשומת לב למעבר בגרון.\n\nדנים בחוויה.', tags: ['חייזר', 'חושים', 'אכילה קשובה', 'טעם', 'ריח'] },
    { id: uid(), name: 'רשת של קשרים — Think of a Link', type: 'activity', age: '4-6', goal: 'connection', duration: 12, source: 'book', sourceName: 'Everything Is Connected — Jason Gruhl', summary: 'משחק אסוציאציות על דף להבנת החיבור בין כל הדברים בעולם — שרשרת מחשבות שמגלה קשרים לא צפויים', content: 'חושבים על אדם, מקום, חיה, מחשבה או רגש וכותבים אותו בשורה העליונה.\nשואלים: על מה המילה הזו גורמת לי לחשוב? למה היא קשורה?\nכותבים את הדבר הבא מתחת — וכן הלאה בשרשרת.\n\nלאחר מכן דנים: מה מעניין בקשרים שנוצרו? האם משהו הפתיע אותך?\n\nפעילות זו מפתחת הבנה שכולנו קשורים זה לזה בדרכים לא צפויות.\n\nווריאציה: "איך אני קשור ל...?" — הילד מצייר את הקשר שלו למושגים שונים.', tags: ['חיבורים', 'אסוציאציות', 'הבנה חברתית', 'Everything Is Connected'] },
    { id: uid(), name: 'מודל S.T.O.P', type: 'tool', age: '7-9', goal: 'emotion', duration: 2, source: 'technique', sourceName: 'SBSM Mindfulness Education Curriculum', summary: 'ראשי תיבות לעצירה וחזרה לרגע הנוכחי: Stop / Take a breath / Observe / Proceed', content: 'כשעולים רגשות קשים, משתמשים במודל:\n\nS — Stop (עצור): הפסק את מה שאתה עושה — קח השהיה.\nT — Take a breath (קח נשימה): נשימה ארוכה ואיטית מהאף.\nO — Observe (התבונן): שים לב מה קורה בתוכך (כאב, רגש, מחשבות) או בחמשת החושים סביבך — מבלי לשפוט.\nP — Proceed (המשך): המשך בפעולותיך עם נוכחות רבה יותר ופחות תגובתיות אוטומטית.', tags: ['STOP', 'עצירה', 'תגובתיות', 'שליטה עצמית'] },
    { id: uid(), name: 'מודל R.A.I.N', type: 'tool', age: '7-9', goal: 'emotion', duration: 5, source: 'technique', sourceName: 'SBSM Mindfulness Education Curriculum', summary: 'טכניקת תחקור וקבלה עמוקה של רגשות קשים: Recognize / Allow / Investigate / Non-identify', content: 'R — Recognize (זיהוי): שיום הרגש הנוכחי (למשל: "עכשיו יש פה כעס"). שיום מפחית את עוצמת הרגש.\nA — Allow (אפשור): לאפשר לרגש להיות שם ללא התנגדות או הדחקה.\nI — Investigate (חקירה): לסרוק את הגוף ולבדוק אילו תחושות פיזיות מתלוות לרגש (חום, כיווץ, לחץ).\nN — Non-identify / Nurture (הפרדה/טיפוח): להזכיר לעצמי שהרגש הוא רק אנרגיה בתנועה ("אני חווה עצב", לא "אני אדם עצוב"). לשלוח חמלה לעצמי.', tags: ['RAIN', 'רגשות', 'חקירה פנימית', 'קבלה', 'חמלה עצמית'] },
    { id: uid(), name: 'מודל F.L.O.C.K למחשבות', type: 'tool', age: '7-9', goal: 'focus', duration: 3, source: 'technique', sourceName: 'SBSM Mindfulness Education Curriculum', summary: 'ראשי תיבות להתבוננות במחשבות מבלי להזדהות איתן: Feeling / Labeling / Observing / Counting / Kindness', content: 'F — Feeling (הרגשה): שימת לב לרגשות ולתחושות הגוף שעולים עם המחשבה.\nL — Labeling (תיוג): מתן תווית — "זה תכנון", "זה זיכרון", "זו ביקורת".\nO — Observing (התבוננות): התבוננות במחשבות כמו בעננים שחולפים בשמיים, מבלי להיאחז בהן.\nC — Counting (ספירה): מניית המחשבות כדרך לשמור מרחק מהתוכן שלהן.\nK — Kindness (חמלה): להתייחס לעצמי באדיבות גם כשהמחשבות נודדות או קשות.', tags: ['FLOCK', 'מחשבות', 'תיוג', 'עננים', 'חמלה עצמית'] },
    { id: uid(), name: 'החץ השני', type: 'tool', age: '7-9', goal: 'emotion', duration: 5, source: 'technique', sourceName: 'SBSM Mindfulness Education Curriculum', summary: 'מטאפורה על הימנעות מהוספת סבל מיותר על כאב מקורי — החץ הראשון הוא הכאב, החץ השני הוא השיפוט העצמי', content: '"החצים הראשונים" הם אירועים כואבים שקורים לנו ואין לנו שליטה עליהם (אכזבה, פציעה, ציון נמוך).\n\n"החץ השני" הוא הכעס, השיפוט, או האשמה העצמית שאנו יורים על עצמנו בעקבות החץ הראשון — מה שמייצר כאב נוסף.\n\nאפשר למנוע את החץ השני על ידי:\n- מודעות\n- השהיית התגובה הראשונית\n- הפניית חמלה וקבלה כלפי עצמנו', tags: ['חץ שני', 'חמלה עצמית', 'סבל', 'שיפוט עצמי'] },
    { id: uid(), name: 'תפיסת מחשבות — מיקוד בנקודה', type: 'activity', age: '4-6', goal: 'focus', duration: 3, source: 'book', sourceName: 'Mindfulness Exercises For Kids — Lilian Forster', summary: 'מתמקדים בחפץ אחד בחדר למשך 10 שניות — כשמחשבות פורצות, מכירים בהן ומחזירים קשב לחפץ', content: 'הילדים מסתכלים מסביב ובוחרים חפץ אחד להתבונן בו.\nשמים לב לגודל, לצבע ולצורה שלו.\nמתרכזים בו במשך 10 שניות שלמות.\n\nהמנחה מסביר: "בהתחלה תרגישו שמחשבות \'פורצות\' פנימה בניסיון להסיח. אל תילחמו בהן! תפקידכם רק להכיר בכך שהמחשבה הגיעה, ובעדינות להסיט את הריכוז בחזרה לחפץ."\n\nממשיכים ל-6 חפצים שונים בחדר, אחד בכל פעם.', tags: ['מיקוד', 'מחשבות נודדות', 'ריכוז', 'חפץ'] },
    { id: uid(), name: 'פנטומימת רגשות', type: 'activity', age: '4-6', goal: 'emotion', duration: 15, source: 'book', sourceName: 'Mindfulness Exercises For Kids — Lilian Forster', summary: 'משחק ניחוש רגשות באמצעות שפת גוף והבעות פנים בלבד — מפתח אוצר מילים רגשי וקריאת פנים', content: 'מכינים פתקים עם רגשות שונים (שמחה, פחד, גועל, מבוכה, ביישנות, קנאה, כעס, הפתעה) ומניחים בקערה.\n\nכל ילד בתורו מושך פתק ועומד מול הכיתה.\nמציגים את הרגש ללא מילים (אפשר קולות אך לא מילים) עד שמישהו מנחש נכונה.\nמי שמנחש מקבל נקודה.\n\nמפתח: אוצר מילים רגשי + יכולת קריאת שפת גוף ופנים אצל האחר.', tags: ['פנטומימה', 'שפת גוף', 'זיהוי רגשות', 'משחק'] },
    { id: uid(), name: 'מדיטציית פוצץ את הכעס', type: 'activity', age: '4-6', goal: 'emotion', duration: 7, source: 'book', sourceName: 'Mindfulness Exercises For Kids — Lilian Forster', summary: 'דמיון מודרך לנשיפת הכעס אל תוך בלון דמיוני ופיצוצו — שחרור חזותי של רגש קשה', content: 'יושבים בנוחות, עיניים עצומות, כמה נשימות עמוקות.\n\nמדריך: "דמיינו שאתם עומדים בחדר בצבע האהוב עליכם. מוציאים מהכיס בלון ריק. חישבו על מה שהכעיס אתכם. הרשו לעצמכם לחוש את הרגש. כל הכעס זורם לריאות — קחו נשימה ונפחו את הבלון! הבלון גדל ומתנפח מהכעס. כשכל הכעס יצא — קשרו את הבלון. עכשיו — פוצצו אותו! (בדמיון). דרכו עליו, דקרו במחט דמיונית. שמעו את הפיצוץ והרגישו את השחרור."\n\nפוקחים עיניים ברגיעה.', tags: ['דמיון מודרך', 'כעס', 'בלון', 'שחרור', 'נשיפה'] },
    { id: uid(), name: 'אבן קרקוע', type: 'activity', age: 'all', goal: 'focus', duration: 30, source: 'book', sourceName: 'Mindfulness Exercises For Kids — Lilian Forster', summary: 'מעצבים אבן חלקה לנשיאה בכיס — ככלי להרגעה פיזית בזמני לחץ דרך חוש המישוש', content: 'מחלקים חלוקי נחל (אבנים חלקות).\nהילדים מעצבים וצובעים את האבן בצבעי אקריליק.\nרושמים או מציירים מסר חיובי אישי (סמל מרגיע, מילה כמו "שקט").\n\nלאחר שהאבן מתייבשת — הילדים נושאים אותה בכיסם.\n\nבעת תחושת מתח, עצב או חרדה:\n- מכניסים יד לכיס\n- ממששים את פני השטח החלקים\n- נזכרים במסר החיובי\n\nמחזיר לכאן ועכשיו דרך חוש המישוש.', tags: ['יצירה', 'אבן', 'קרקוע', 'מישוש', 'עוגן פיזי'] },
    { id: uid(), name: 'כדור לחץ מבלון', type: 'activity', age: 'all', goal: 'body', duration: 15, source: 'book', sourceName: 'Mindfulness Exercises For Kids — Lilian Forster', summary: 'הכנה עצמית של כדור לחץ למעיכה ושחרור מתח — חיזוק שרירי ידיים ושחרור כעס באופן פיזי ובטוח', content: 'מכניסים בלון אחד לתוך בלון שני (שכבה כפולה שלא תקרע).\nבעזרת משפך ממלאים באורז, קמח או שעועית יבשה.\nקושרים היטב.\nאפשר לצייר פרצופים על הבלון החיצוני בטוש בלתי מחיק.\n\nהכדור ישמש:\n- כאביזר ויסות ופוקוס\n- להוצאת אנרגיה\n- לחיזוק שרירי הידיים\n- לשחרור כעס ומתח באופן פיזי ובטוח', tags: ['יצירה', 'כדור לחץ', 'שחרור מתח', 'מישוש'] },
    { id: uid(), name: 'מחממי אוזניים — עיסוי אוזניים', type: 'tool', age: 'all', goal: 'body', duration: 2, source: 'book', sourceName: 'Mindfulness Exercises For Kids — Lilian Forster', summary: 'לחיצות עדינות על קצוות האוזניים להרגעה מהירה — מבוסס על עקרונות רפואה עתיקה', content: 'בפעם הבאה שחשים במצב רוח רע או לחץ:\n\n1. יוצרים צורת "צבת" עם האגודל והאצבע המורה.\n2. מתחילים בחלק העליון של האוזן — צובטים בעדינות לשלוש שניות.\n3. נעים בהדרגה לאורך קווי המתאר החיצוניים של האוזן כלפי מטה.\n4. מגיעים לתנוך האוזן הרך ומעסים גם אותו.\n\nפעולה זו מרגיעה את מערכת העצבים.', tags: ['עיסוי', 'אוזניים', 'הרגעה מהירה', 'גוף'] },
    { id: uid(), name: 'ריקוד הדופמין', type: 'activity', age: '7-9', goal: 'body', duration: 5, source: 'personal', sourceName: 'MU Mindful Activity Pack', summary: 'ריקוד חופשי לצלילי שיר אהוב — שחרור מתח והעלאת מצב הרוח דרך תנועה ספונטנית', content: 'בחרו שיר שתמיד גורם לכם לחייך.\nנגנו אותו בעוצמה הנכונה עבורכם.\n\nכשלוחצים פליי — התמסרו למוזיקה, לכלים ולמילים. שכחו מהכל. תרגישו את הקצב ותרקדו!\n\nבצעו תנועות שמרגישות טוב לגוף — אפילו תנועות שמרגישות "טיפשיות".\n\nלאחר מכן: שימו לב עד כמה הגוף מרגיש שונה מלפני.', tags: ['ריקוד', 'מוזיקה', 'תנועה חופשית', 'שחרור מתח'] },
    { id: uid(), name: 'משחק הצחוק', type: 'activity', age: 'all', goal: 'connection', duration: 3, source: 'personal', sourceName: 'MU Mindful Activity Pack', summary: 'שרים שיר מוכר אבל מחליפים את המילים ב-"הא הא" — עד שמגיע צחוק אמיתי', content: 'חישבו על שיר שאתם אוהבים.\nבמקום לשיר את המילים האמיתיות — השתמשו ב-"הא" ו-"הא-הא" לפי המנגינה.\nזה ישמע כאילו אתם צוחקים בקול רם.\n\nנסו לשיר את כל השיר עם "הא-הא" — במהרה תגלו שמתחילים לצחוק צחוק אמיתי ומתגלגל.\n\nמשחרר לחץ, תורם להרפיה ומעלה מצב הרוח.', tags: ['צחוק', 'שירה', 'שחרור', 'שמחה'] },

    { id: uid(), name: 'קופסת מזין הרגשות', type: 'activity', age: '1-3', goal: 'emotion', duration: 5, source: 'book', sourceName: 'Mindfulness for Preschool & Kindergarten — Monica Moore Jackman (OMPK)', summary: 'קופסה מוחשית להפסקת "האכלת כעס" והתחלת "האכלת" רגשות טובים — כדורי צמר גפן שמשולשלים לפרצופים חיוביים', content: 'מכינים קופסה עם תמונות פרצופי רגשות חיוביים (אהבה, הוקרת תודה, שלווה).\n\nמסבירים: כשיש לנו כעס — אם נמשיך לחשוב עליו ולעשות בחירות פוגעניות, אנחנו מאכילים אותו והוא גדל. אם נפסיק להאכיל אותו, הוא יקטן ויעלם.\n\nהילד שחש כעס ניגש לקופסת "מזין הרגשות" ומשלשל פנימה כדורי צמר גפן — "מאכיל" חמלה, רגיעה או שמחה.\n\nמחליף את הכעס בהתמקדות ברגש חיובי.', tags: ['כעס', 'העברת קשב', 'רגשות חיוביים', 'יצירה', 'OMPK'] },
    { id: uid(), name: 'שיר להיות כמו עץ', type: 'activity', age: '1-3', goal: 'emotion', duration: 5, source: 'book', sourceName: 'Mindfulness for Preschool & Kindergarten — Monica Moore Jackman (OMPK)', summary: 'שיר ותנועה המלמדים על חוסן נפשי — עץ שעומד יציב בסערה, יודע שהגשם ייפסק', content: 'מסבירים לילדים: "רגשות וקשיים הם כמו סערה חולפת. כשיורד גשם ואנחנו רוצים שיפסיק — מה אנחנו יכולים לעשות? אפשר לחכות כמו עץ. העץ לא בורח ולא מרביץ לחברים שלו, הוא יודע שהגשם ייפסק."\n\nהילדים עומדים ושרים את שיר "Be Like a Tree" תוך חיקוי תנועות המורה — עץ יציב הניצב בסערה.\n\nהתרגיל מבהיר שאי אפשר ואין צורך להילחם בקושי, אלא להיות יציבים עד שיחלוף.', tags: ['שיר', 'עץ', 'סערה', 'חוסן', 'קבלת רגשות', 'OMPK'] },

    { name: 'תשומת לב לנשימה ביומיום', type: 'tool', age: '7-9', goal: 'focus', duration: 5, summary: 'לשים לב לנשימה בזמן סרט מפחיד, רגע שמח, רכיבה על אופניים — מה הנשימה מספרת לי?', content: 'תרגול של הפניית קשב לנשימה ברגעים שונים ביומיום.\n\nמבקשים לשים לב לנשימה:\n- בזמן צפייה בסרט מפחיד (האם עצרנו נשימה?)\n- ברגעים של שמחה מלאה (האם הנשימה עמוקה או שטחית?)\n- בזמן רכיבה על אופניים\n- המתנה בתור לקופה\n- שיחה עם חברים\n\nשאלה מנחה: מה הנשימה שלך מספרת לך עכשיו?', tags: ['נשימה', 'יומיום', 'מודעות', 'חטיבה'] },

    { name: 'הקשבה לאחר — שולחן המשפחה', type: 'activity', age: 'all', goal: 'connection', duration: 8, summary: 'כל אחד מקבל שתי דקות לדבר. האחרים מקשיבים מלאה — ללא שיפוט, ללא הפרעה, ללא הכנת תגובה', content: 'תרגיל לשולחן האוכל המשפחתי:\n\nכל אחד מקבל שתי דקות מלאות לדבר על היום שלו.\n\nבזמן הזה — כל השאר מקשיבים הקשבה מלאה:\n- מבלי לשפוט\n- מבלי להפריע\n- מבלי להכין בראש תגובה\n\nהמטרה: להקשיב מתוך רצון אמיתי לשמוע ולהבין את האחר.', tags: ['הקשבה', 'משפחה', 'קשר', 'שולחן אוכל'] },
